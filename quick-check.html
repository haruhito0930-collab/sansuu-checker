<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3分かんたん診断 - 算数つまずきチェッカー</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root{--pink:#ff6b9d;--blue:#4ea8de;--green:#51cf66;--purple:#cc5de8;--orange:#ff922b;--red:#ff6b6b;--bg:#fef7ff;--card:#fff;--text:#2d3436;--text-soft:#636e72;--shadow:0 4px 20px rgba(0,0,0,.06);--radius:20px;--yellow-light:#fff9db}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Zen Maru Gothic','Hiragino Kaku Gothic ProN',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:16px;overflow-x:hidden}
  .container{max-width:560px;margin:0 auto}
  .header{text-align:center;padding:0;margin-bottom:14px;background:linear-gradient(135deg,#f59e0b,#f97316);border-radius:var(--radius);overflow:hidden}.header-inner{padding:20px 16px 16px}
  .header-icon{font-size:2.2rem}.header h1{font-size:1.3rem;font-weight:900;color:#fff;margin-top:4px}.header p{color:rgba(255,255,255,.85);font-size:.85rem;margin-top:2px;font-weight:700}
  .card{background:var(--card);border-radius:var(--radius);padding:18px 16px;margin-bottom:12px;box-shadow:var(--shadow)}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 24px;border:none;border-radius:14px;font-size:1rem;font-weight:700;font-family:inherit;cursor:pointer;transition:all .15s}.btn:active{transform:scale(.96)}
  .btn-orange{background:var(--orange);color:#fff}.btn-blue{background:var(--blue);color:#fff}.btn-green{background:var(--green);color:#fff}
  .btn-group{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:14px}
  .hidden{display:none!important}
  .grade-btn{display:flex;align-items:center;gap:12px;padding:16px;border:2.5px solid #e0e0e0;border-radius:16px;cursor:pointer;transition:all .15s;background:#fff;width:100%;margin-bottom:8px;font-family:inherit;font-size:1rem;font-weight:700;color:var(--text);text-align:left}
  .grade-btn:active{transform:scale(.97)}
  .grade-btn .gi{font-size:1.8rem;flex-shrink:0}
  .grade-btn.kindergarten{border-color:#f9a8d4}.grade-btn.g1{border-color:#93c5fd}.grade-btn.g2{border-color:#86efac}
  @media(hover:hover){.grade-btn:hover{transform:scale(1.02);box-shadow:0 2px 12px rgba(0,0,0,.08)}}
  .progress-wrap{margin-bottom:12px}
  .progress-label{font-size:.8rem;font-weight:700;color:var(--text-soft);text-align:center;margin-bottom:6px}
  .progress-track{height:8px;background:#e0e0e0;border-radius:4px;overflow:hidden}.progress-fill{height:100%;background:linear-gradient(90deg,#f59e0b,#f97316);border-radius:4px;transition:width .4s}
  .q-unit-label{text-align:center;font-size:.8rem;font-weight:700;color:var(--orange);margin-bottom:4px}
  .question-text{text-align:center;font-size:1.15rem;font-weight:900;margin:8px 0 14px}
  .choice-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:380px;margin:0 auto}
  .choice-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;max-width:400px;margin:0 auto}
  .choice-btn{border:3px solid #e0e0e0;border-radius:16px;background:#fff;font-weight:900;font-family:inherit;color:var(--text);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;padding:14px 10px;font-size:1.1rem;flex-direction:column;gap:4px}
  @media(hover:hover){.choice-btn:hover{border-color:var(--blue);background:#e8f4fd;transform:scale(1.03)}}@media(hover:none){.choice-btn:hover{border-color:#e0e0e0;background:#fff;transform:none}}
  .choice-btn:active{transform:scale(.95)}.choice-btn.correct{border-color:var(--green);background:#e6fcf0;color:var(--green)}.choice-btn.wrong{border-color:var(--red);background:#fff0f0;color:var(--red);animation:shake .4s}.choice-btn:disabled{cursor:default;opacity:.7}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
  @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:280px;margin:0 auto}
  .numpad-btn{padding:14px;border:2.5px solid #e0e0e0;border-radius:14px;background:#fff;font-size:1.4rem;font-weight:900;font-family:inherit;color:var(--text);cursor:pointer;transition:all .15s;text-align:center}
  .numpad-btn:active{transform:scale(.95)}.numpad-btn.enter-btn{background:var(--blue);color:#fff;border-color:var(--blue)}.numpad-btn.clear-btn{background:#f8f9fa;color:var(--text-soft);border-color:#ddd;font-size:1rem}
  .problem-display{text-align:center;padding:12px 8px;font-size:2rem;font-weight:900;letter-spacing:2px;margin-bottom:8px}.problem-display .op{color:var(--blue);margin:0 4px}.problem-display .eq{color:var(--orange);margin:0 4px}
  .answer-box{display:inline-block;min-width:50px;border-bottom:4px solid var(--blue);color:var(--blue);padding:0 4px}.answer-box.filled{color:var(--text)}.answer-box.correct-ans{border-color:var(--green);color:var(--green)}.answer-box.wrong-ans{border-color:var(--red);color:var(--red)}
  .emoji-display{text-align:center;padding:12px 8px;min-height:60px;display:flex;flex-wrap:wrap;justify-content:center;align-items:center;gap:6px}.emoji-item{font-size:2.2rem}
  .number-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;max-width:340px;margin:0 auto}
  .num-btn{aspect-ratio:1;border:3px solid #e0e0e0;border-radius:14px;background:#fff;font-size:1.4rem;font-weight:900;font-family:inherit;color:var(--text);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
  .num-btn:active{transform:scale(.95)}.num-btn.correct{border-color:var(--green);background:#e6fcf0;color:var(--green)}.num-btn.wrong{border-color:var(--red);background:#fff0f0;color:var(--red)}.num-btn:disabled{cursor:default;opacity:.7}
  .tap-grid{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;max-width:380px;margin:0 auto}
  .tap-item{width:60px;height:60px;border:3px solid #e0e0e0;border-radius:14px;background:#fff;font-size:2rem;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
  .tap-item.selected{border-color:var(--blue);background:#e8f4fd;transform:scale(1.08)}
  .tap-item.correct-mark{border-color:var(--green);background:#e6fcf0}.tap-item.wrong-mark{border-color:var(--red);background:#fff0f0}
  .order-grid{display:flex;justify-content:center;gap:4px;margin:0 auto;flex-wrap:nowrap}
  .order-item{width:46px;height:46px;border:3px solid #e0e0e0;border-radius:12px;background:#fff;font-size:1.4rem;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;position:relative;flex-shrink:0}
  .order-item.correct-mark{border-color:var(--green);background:#e6fcf0}.order-item.wrong-mark{border-color:var(--red);background:#fff0f0}
  .order-label{position:absolute;bottom:-16px;font-size:.6rem;font-weight:700;color:var(--text-soft)}
  .submit-row{text-align:center;margin-top:14px}
  .result-screen{text-align:center;padding:24px 16px}.result-icon{font-size:3rem;margin-bottom:8px}.result-title{font-size:1.3rem;font-weight:900;margin-bottom:8px}
  .chart-container{text-align:center;margin:16px 0}
  .diag-box{background:var(--yellow-light);border:2px solid #ffe066;border-radius:16px;padding:16px;margin-top:16px;text-align:left}
  .diag-title{font-weight:900;font-size:1rem;color:#b45309;margin-bottom:10px;text-align:center}
  .diag-text{font-size:.88rem;line-height:1.8;color:var(--text)}
  .confetti-container{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1100;overflow:hidden}.confetti{position:absolute;top:-20px;font-size:1.5rem;animation:confettiFall linear forwards}@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
</style>
</head>
<body>
<div class="container">
  <div class="header"><div class="header-inner"><div class="header-icon">⚡</div><h1>3分 かんたん診断</h1><p>とくい・にがてが すぐわかる！</p></div></div>
  <div id="gradeSelect">
    <div class="card">
      <p style="text-align:center;font-weight:700;margin-bottom:12px">がくねんを えらんでね</p>
      <button class="grade-btn kindergarten" onclick="startDiag('kindergarten')"><span class="gi">🎒</span><span style="display:inline-block"><span style="display:block">ようちえん</span><span style="display:block;font-size:.75rem;color:var(--text-soft);font-weight:400">10もん・やく2ふん</span></span></button>
      <button class="grade-btn g1" onclick="startDiag('grade1')"><span class="gi">📐</span><span style="display:inline-block"><span style="display:block">小学1年生</span><span style="display:block;font-size:.75rem;color:var(--text-soft);font-weight:400">16もん・やく3ふん</span></span></button>
      <button class="grade-btn g2" onclick="startDiag('grade2')"><span class="gi">✖️</span><span style="display:inline-block"><span style="display:block">小学2年生</span><span style="display:block;font-size:.75rem;color:var(--text-soft);font-weight:400">16もん・やく3ふん</span></span></button>
    </div>
  </div>
  <div id="quizScreen" class="hidden"><div class="card"><div class="progress-wrap"><div class="progress-label" id="progLabel">1 / 10</div><div class="progress-track"><div class="progress-fill" id="progFill" style="width:0%"></div></div></div><div class="q-unit-label" id="unitLabel"></div><div id="quizContent"></div></div></div>
  <div id="resultScreen" class="hidden"><div class="card result-screen" id="resultContent"></div></div>
</div>
<div class="confetti-container" id="confettiContainer"></div>
<script>
const AC=window.AudioContext||window.webkitAudioContext;let ac;function ea(){if(!ac)ac=new AC}
function sndOk(){ea();[523.25,659.25,783.99].forEach((f,i)=>{const o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(.3,ac.currentTime+i*.12);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+i*.12+.4);o.start(ac.currentTime+i*.12);o.stop(ac.currentTime+i*.12+.4)})}
function sndNg(){ea();[329.63,261.63].forEach((f,i)=>{const o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(.2,ac.currentTime+i*.15);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+i*.15+.35);o.start(ac.currentTime+i*.15);o.stop(ac.currentTime+i*.15+.35)})}
function sndFanfare(){ea();[523.25,659.25,783.99,1046.5].forEach((f,i)=>{const o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.type='triangle';o.frequency.value=f;g.gain.setValueAtTime(.3,ac.currentTime+i*.15);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+i*.15+.5);o.start(ac.currentTime+i*.15);o.stop(ac.currentTime+i*.15+.5)})}
function sndClick(){ea();const o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.type='sine';o.frequency.value=800;g.gain.setValueAtTime(.15,ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.08);o.start(ac.currentTime);o.stop(ac.currentTime+.08)}
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

let grade='',questions=[],currentQ=0,answered=false,unitResults={},inputVal='';

// ========== ADAPTIVE QUESTION BANKS ==========
// Each unit has: standard (1st question), hard (if 1st correct), easy (if 1st wrong)
const EMOJI_ITEMS=[{e:'🍎',n:'りんご'},{e:'🍊',n:'みかん'},{e:'🍌',n:'バナナ'},{e:'🍓',n:'いちご'},{e:'🌸',n:'おはな'},{e:'⭐',n:'ほし'},{e:'🐟',n:'おさかな'},{e:'🦋',n:'ちょうちょ'},{e:'🐞',n:'てんとうむし'},{e:'🎈',n:'ふうせん'}];
const SHAPES=[{e:'⭕',n:'まる',s:'circle'},{e:'🔺',n:'さんかく',s:'triangle'},{e:'🟧',n:'しかく',s:'square'}];
const SHAPE_ITEMS=[{e:'⚽',s:'circle'},{e:'🍩',s:'circle'},{e:'🕐',s:'circle'},{e:'🔺',s:'triangle'},{e:'🍕',s:'triangle'},{e:'📦',s:'square'},{e:'🎁',s:'square'},{e:'📺',s:'square'}];
const CLASSIFY_GROUPS=[{label:'くだもの',members:['🍎','🍊','🍌','🍓'],distractors:['🚗','🐸','✏️']},{label:'どうぶつ',members:['🐶','🐱','🐸','🐟'],distractors:['🍎','🚗','✏️']}];
const ORDER_EMOJIS=['🍎','🍊','🍌','🍓','🐸','🦋','⭐','🎈'];

function clockSVG(hA,mA,sz){const cx=sz/2,cy=sz/2,r=sz/2-12;let s=`<svg viewBox="0 0 ${sz} ${sz}" width="${sz}" height="${sz}"><circle cx="${cx}" cy="${cy}" r="${r}" fill="#fff" stroke="#333" stroke-width="2.5"/>`;for(let i=1;i<=12;i++){const a=(i*30-90)*Math.PI/180;s+=`<line x1="${cx+Math.cos(a)*(r-5)}" y1="${cy+Math.sin(a)*(r-5)}" x2="${cx+Math.cos(a)*(r-14)}" y2="${cy+Math.sin(a)*(r-14)}" stroke="#333" stroke-width="2" stroke-linecap="round"/><text x="${cx+Math.cos(a)*(r-24)}" y="${cy+Math.sin(a)*(r-24)}" text-anchor="middle" dominant-baseline="central" font-size="${sz>150?14:11}" font-weight="900" fill="#333" font-family="sans-serif">${i}</text>`}const ha=(hA-90)*Math.PI/180;s+=`<line x1="${cx}" y1="${cy}" x2="${cx+Math.cos(ha)*r*.4}" y2="${cy+Math.sin(ha)*r*.4}" stroke="#e74c3c" stroke-width="5" stroke-linecap="round"/>`;const ma=(mA-90)*Math.PI/180;s+=`<line x1="${cx}" y1="${cy}" x2="${cx+Math.cos(ma)*r*.6}" y2="${cy+Math.sin(ma)*r*.6}" stroke="#2980b9" stroke-width="3" stroke-linecap="round"/><circle cx="${cx}" cy="${cy}" r="4" fill="#333"/></svg>`;return s}

// === GRADE CONFIGS with adaptive levels ===
const GRADES={
kindergarten:{
  label:'ようちえん',link:'kindergarten.html',chartLabel:['かず','おおきさ','かたち','なかまわけ','じゅんばん'],
  units:[
    {id:'count',label:'かず',
      std:()=>{const it=EMOJI_ITEMS[rnd(0,9)],c=rnd(3,7);return{type:'count',e:it.e,n:it.n,count:c,answer:c,unitId:'count'}},
      hard:()=>{const it=EMOJI_ITEMS[rnd(0,9)],c=rnd(7,10);return{type:'count',e:it.e,n:it.n,count:c,answer:c,unitId:'count'}},
      easy:()=>{const it=EMOJI_ITEMS[rnd(0,9)],c=rnd(1,3);return{type:'count',e:it.e,n:it.n,count:c,answer:c,unitId:'count'}}},
    {id:'compare',label:'おおきさ',
      std:()=>{const i1=EMOJI_ITEMS[rnd(0,5)];let i2;do{i2=EMOJI_ITEMS[rnd(0,9)]}while(i2.e===i1.e);return{type:'compare',e1:i1.e,n1:i1.n,c1:rnd(3,6),e2:i2.e,n2:i2.n,c2:rnd(1,3),answer:'left',unitId:'compare'}},
      hard:()=>{const i1=EMOJI_ITEMS[rnd(0,5)];let i2;do{i2=EMOJI_ITEMS[rnd(0,9)]}while(i2.e===i1.e);const c1=rnd(5,7),c2=c1-1;return{type:'compare',e1:i1.e,n1:i1.n,c1,e2:i2.e,n2:i2.n,c2,answer:'left',unitId:'compare'}},
      easy:()=>{const i1=EMOJI_ITEMS[rnd(0,5)];let i2;do{i2=EMOJI_ITEMS[rnd(0,9)]}while(i2.e===i1.e);return{type:'compare',e1:i1.e,n1:i1.n,c1:rnd(5,8),e2:i2.e,n2:i2.n,c2:1,answer:'left',unitId:'compare'}}},
    {id:'shape',label:'かたち',
      std:()=>{const it=SHAPE_ITEMS[rnd(0,7)];return{type:'shape',e:it.e,answer:it.s,unitId:'shape'}},
      hard:()=>{const it=SHAPE_ITEMS[rnd(0,7)];return{type:'shape',e:it.e,answer:it.s,unitId:'shape'}},
      easy:()=>{const items=[{e:'⚽',s:'circle'},{e:'📦',s:'square'},{e:'🔺',s:'triangle'}];const it=items[rnd(0,2)];return{type:'shape',e:it.e,answer:it.s,unitId:'shape'}}},
    {id:'classify',label:'なかまわけ',
      std:()=>{const g=CLASSIFY_GROUPS[rnd(0,1)];const m=shuffle([...g.members]).slice(0,3),d=shuffle([...g.distractors]).slice(0,3);return{type:'classify',label:g.label,items:shuffle([...m,...d]),correctItems:m,unitId:'classify'}},
      hard:()=>{const g=CLASSIFY_GROUPS[rnd(0,1)];const m=shuffle([...g.members]).slice(0,3),d=shuffle([...g.distractors]).slice(0,3);return{type:'classify',label:g.label,items:shuffle([...m,...d]),correctItems:m,unitId:'classify'}},
      easy:()=>{const g=CLASSIFY_GROUPS[rnd(0,1)];const m=shuffle([...g.members]).slice(0,2),d=shuffle([...g.distractors]).slice(0,2);return{type:'classify',label:g.label,items:shuffle([...m,...d]),correctItems:m,unitId:'classify'}}},
    {id:'order',label:'じゅんばん',
      std:()=>{const pool=shuffle([...ORDER_EMOJIS]).slice(0,5);const ti=rnd(0,4),dir='left',dp=ti+1;return{type:'order',items:pool,targetIdx:ti,direction:dir,displayPos:dp,unitId:'order'}},
      hard:()=>{const pool=shuffle([...ORDER_EMOJIS]).slice(0,5);const ti=rnd(0,4),dir='right',dp=5-ti;return{type:'order',items:pool,targetIdx:ti,direction:dir,displayPos:dp,unitId:'order'}},
      easy:()=>{const pool=shuffle([...ORDER_EMOJIS]).slice(0,4);return{type:'order',items:pool,targetIdx:0,direction:'left',displayPos:1,unitId:'order'}}}
  ],
  genReport:(scores)=>{
    const s=scores;let t='';
    // count
    if(s.count===2)t+='数を数える力はしっかり身についています。';else if(s.count===1)t+='数を数える基本はできていますが、大きい数になると少し不安があるかもしれません。日常の中で「いくつある？」と聞いてあげると効果的です。';else t+='数を数えることにまだ慣れていないようです。おはじきやブロックを使って、実際に手で触りながら数える練習から始めましょう。';
    // compare
    if(s.compare===2)t+=' 大小の比較もバッチリです！';else if(s.compare===1)t+=' 大小の比較は、明らかに違うものはわかりますが、数が近いと迷うことがあるようです。';else t+=' 「どっちが多い？」の判断がまだ難しいようです。実物を並べて比べる経験を増やしてあげてください。';
    // shape
    if(s.shape===2)t+=' 形の区別もしっかりできています。';else if(s.shape===1)t+=' 形の基本はわかっていますが、似た形で迷うことがあります。「角があるかないか」に注目させてみてください。';else t+=' まる・さんかく・しかくの区別にまだ練習が必要です。おうちの中で「これは何の形？」と遊び感覚で聞いてあげましょう。';
    // classify
    if(s.classify===2)t+=' 仲間わけの力も素晴らしいです！';else if(s.classify===1)t+=' 仲間わけは基本的にできていますが、似たものの区別で迷うことがあります。';else t+=' 仲間わけの感覚を育てましょう。おもちゃの片づけで「動物だけ集めて」などのゲームが効果的です。';
    // order
    if(s.order===2)t+=' 順番の理解もバッチリです！';else if(s.order===1)t+=' 順番は基本的にわかっていますが、「右から」と「左から」の使い分けで混乱することがあるようです。';else t+=' 「何番目」の概念にまだ慣れていないようです。まず右・左を確認してから、指で一つずつ数える練習をしましょう。';
    const total=Object.values(s).reduce((a,b)=>a+b,0),max=Object.keys(s).length*2;
    if(total===max)t+='\n\n現時点での総合力は非常に高いです！この調子で楽しく学び続けましょう。';
    else if(total>=max*0.7)t+='\n\n全体的に良い状態です。苦手な部分を少し重点的に練習すれば、さらに伸びます！';
    else t+='\n\nまだこれからの部分が多いですが、焦る必要はありません。得意なところから自信をつけて、少しずつ苦手に取り組みましょう。';
    return t;
  }
},
grade1:{
  label:'小学1年生',link:'grade1.html',chartLabel:['たしざん','ひきざん','くりあがり','くりさがり','大小','とけい','ながさ','ぶんしょう'],
  units:[
    {id:'add_basic',label:'たしざん',
      std:()=>{const a=rnd(3,6),b=rnd(2,4);return{type:'calc',a,b,op:'+',answer:a+b,unitId:'add_basic'}},

// ========== ADAPTIVE FLOW ==========
let totalQCount=0;
function startDiag(g){
  sndClick();grade=g;currentQ=0;answered=false;unitResults={};inputVal='';
  const cfg=GRADES[g];
  questions=[];
  cfg.units.forEach(u=>{
    questions.push({...u.std(),_unitRef:u,_phase:1});
    questions.push(null);// placeholder for adaptive 2nd question
  });
  totalQCount=cfg.units.length*2;
  document.getElementById('gradeSelect').classList.add('hidden');
  document.getElementById('quizScreen').classList.remove('hidden');
  renderQ();
}

function renderQ(){
  answered=false;inputVal='';
  // Skip null placeholders (shouldn't happen, but safety)
  if(questions[currentQ]===null){currentQ++;if(currentQ>=questions.length){showResult();return}renderQ();return}
  const displayNum=Math.floor(currentQ/2)*2+(questions[currentQ]._phase===1?1:2);
  document.getElementById('progLabel').textContent=`${displayNum} / ${totalQCount}`;
  document.getElementById('progFill').style.width=`${((displayNum-1)/totalQCount)*100}%`;
  const q=questions[currentQ];
  const cfg=GRADES[grade];
  const unit=cfg.units.find(u=>u.id===q.unitId);
  document.getElementById('unitLabel').textContent=unit?unit.label:'';
  const el=document.getElementById('quizContent');
  switch(q.type){
    case'count':rCount(el,q);break;case'compare':rCompare(el,q);break;case'shape':rShape(el,q);break;
    case'classify':rClassify(el,q);break;case'order':rOrder(el,q);break;case'calc':rCalc(el,q);break;
    case'compare_num':rCompNum(el,q);break;case'clock':rClock(el,q);break;case'length':rLen(el,q);break;
    case'choice_simple':rCS(el,q);break;case'word_op':rWordOp(el,q);break;case'word_full':rWordFull(el,q);break;
  }
  window.scrollTo({top:0,behavior:'smooth'});
}

// ========== RENDERERS ==========
function rCount(el,q){el.innerHTML=`<div class="emoji-display">${Array.from({length:q.count},()=>`<span class="emoji-item">${q.e}</span>`).join('')}</div><div class="question-text">${q.n}は いくつ？</div><div class="number-grid">${Array.from({length:10},(_,i)=>`<button class="num-btn" id="nb-${i}" onclick="pickNum(${i+1})">${i+1}</button>`).join('')}</div>`}
function pickNum(n){if(answered)return;answered=true;const q=questions[currentQ];const ok=n===q.answer;document.querySelectorAll('.num-btn').forEach(b=>b.disabled=true);document.getElementById(`nb-${n-1}`).classList.add(ok?'correct':'wrong');if(!ok)document.getElementById(`nb-${q.answer-1}`).classList.add('correct');record(ok)}

function rCompare(el,q){el.innerHTML=`<div class="question-text">どっちが おおい？</div><div class="choice-grid-2"><button class="choice-btn" id="cL" onclick="pickSide('left')"><div style="font-size:1.8rem">${q.e1.repeat(Math.min(q.c1,5))}</div><div style="font-size:.85rem">${q.n1}</div></button><button class="choice-btn" id="cR" onclick="pickSide('right')"><div style="font-size:1.8rem">${q.e2.repeat(Math.min(q.c2,5))}</div><div style="font-size:.85rem">${q.n2}</div></button></div>`}
function rCompNum(el,q){el.innerHTML=`<div class="question-text">どっちが おおきい？</div><div class="choice-grid-2"><button class="choice-btn" id="cL" onclick="pickSide('left')" style="font-size:2rem">${q.a}</button><button class="choice-btn" id="cR" onclick="pickSide('right')" style="font-size:2rem">${q.b}</button></div>`}
function rLen(el,q){const w=q.qType||'ながい';el.innerHTML=`<div class="question-text">どっちが ${w}？</div><div class="choice-grid-2"><button class="choice-btn" id="cL" onclick="pickSide('left')" style="font-size:.95rem">${q.a}</button><button class="choice-btn" id="cR" onclick="pickSide('right')" style="font-size:.95rem">${q.b}</button></div>`}
function pickSide(s){if(answered)return;answered=true;const q=questions[currentQ];const ok=s===q.answer;document.querySelectorAll('.choice-btn').forEach(b=>b.disabled=true);document.getElementById(s==='left'?'cL':'cR').classList.add(ok?'correct':'wrong');if(!ok)document.getElementById(q.answer==='left'?'cL':'cR').classList.add('correct');record(ok)}

function rShape(el,q){el.innerHTML=`<div style="text-align:center;font-size:3.5rem;margin:8px 0">${q.e}</div><div class="question-text">この かたちは？</div><div class="choice-grid-3">${SHAPES.map((s,i)=>`<button class="choice-btn" id="sh-${i}" onclick="pickShape('${s.s}',${i})">${s.e}<div style="font-size:.8rem">${s.n}</div></button>`).join('')}</div>`}
function pickShape(s,i){if(answered)return;answered=true;const q=questions[currentQ];const ok=s===q.answer;document.querySelectorAll('.choice-btn').forEach(b=>b.disabled=true);document.getElementById(`sh-${i}`).classList.add(ok?'correct':'wrong');if(!ok){const ci=SHAPES.findIndex(x=>x.s===q.answer);document.getElementById(`sh-${ci}`).classList.add('correct')}record(ok)}

function rClassify(el,q){el.innerHTML=`<div class="question-text">「${q.label}」の なかまを ぜんぶ えらんでね</div><div class="tap-grid">${q.items.map((e,i)=>`<button class="tap-item" id="tp-${i}" onclick="toggleTap(${i})">${e}</button>`).join('')}</div><div class="submit-row"><button class="btn btn-orange" onclick="chkClassify()">こたえあわせ ✓</button></div>`}
function toggleTap(i){if(answered)return;sndClick();document.getElementById(`tp-${i}`).classList.toggle('selected')}
function chkClassify(){if(answered)return;answered=true;const q=questions[currentQ];const sel=new Set();q.items.forEach((_,i)=>{if(document.getElementById(`tp-${i}`).classList.contains('selected'))sel.add(i)});const cor=new Set(q.items.map((e,i)=>q.correctItems.includes(e)?i:-1).filter(i=>i>=0));const ok=sel.size===cor.size&&[...sel].every(i=>cor.has(i));q.items.forEach((_,i)=>{const el=document.getElementById(`tp-${i}`);el.style.pointerEvents='none';if(cor.has(i))el.classList.add('correct-mark');else if(sel.has(i))el.classList.add('wrong-mark')});record(ok)}

function rOrder(el,q){const dt=q.direction==='left'?'ひだりから':'みぎから';el.innerHTML=`<div class="question-text">${dt} ${q.displayPos}ばんめは？</div><div class="order-grid">${q.items.map((e,i)=>`<button class="order-item" id="ord-${i}" onclick="pickOrd(${i})"><span>${e}</span><span class="order-label" style="visibility:hidden">${q.direction==='left'?i+1:q.items.length-i}</span></button>`).join('')}</div>`}
function pickOrd(i){if(answered)return;answered=true;const q=questions[currentQ];const ok=i===q.targetIdx;document.querySelectorAll('.order-item').forEach(b=>b.style.pointerEvents='none');document.getElementById(`ord-${i}`).classList.add(ok?'correct-mark':'wrong-mark');if(!ok)document.getElementById(`ord-${q.targetIdx}`).classList.add('correct-mark');document.querySelectorAll('.order-label').forEach(l=>l.style.visibility='visible');record(ok)}

function rCalc(el,q){const maxLen=String(q.answer).length;el.innerHTML=`<div class="problem-display">${q.a} <span class="op">${q.op}</span> ${q.b} <span class="eq">=</span> <span class="answer-box" id="aBox">?</span></div><div class="numpad">${[1,2,3,4,5,6,7,8,9].map(n=>`<button class="numpad-btn" onclick="nIn(${n})">${n}</button>`).join('')}<button class="numpad-btn clear-btn" onclick="nCl()">けす</button><button class="numpad-btn" onclick="nIn(0)">0</button><button class="numpad-btn enter-btn" onclick="nOk()">OK</button></div>`;el._maxLen=maxLen}
function nIn(n){if(answered)return;sndClick();const maxLen=document.getElementById('quizContent')._maxLen||3;if(inputVal.length>=maxLen)return;inputVal+=String(n);document.getElementById('aBox').textContent=inputVal;document.getElementById('aBox').classList.add('filled')}
function nCl(){if(answered)return;sndClick();inputVal='';document.getElementById('aBox').textContent='?';document.getElementById('aBox').classList.remove('filled')}
function nOk(){if(answered||inputVal==='')return;answered=true;const q=questions[currentQ];const picked=parseInt(inputVal);const ok=picked===q.answer;document.querySelectorAll('.numpad-btn').forEach(b=>b.disabled=true);const box=document.getElementById('aBox');if(ok){box.classList.add('correct-ans');box.textContent=q.answer}else{box.classList.add('wrong-ans');setTimeout(()=>{box.insertAdjacentHTML('afterend',`<span style="display:inline-block;color:var(--green);font-size:2rem;font-weight:900;margin-left:8px;animation:fadeIn .4s">→ ${q.answer}</span>`)},500)}record(ok)}

function rClock(el,q){el.innerHTML=`<div style="text-align:center;margin:8px 0">${clockSVG(q.hA,q.mA,170)}</div><div class="question-text">いま なんじ？</div><div class="choice-grid-3">${q.choices.map((c,i)=>`<button class="choice-btn" id="ck-${i}" onclick="pickCk(${i})" style="font-size:1rem;padding:12px 6px">${c}</button>`).join('')}</div>`}
function pickCk(i){if(answered)return;answered=true;const q=questions[currentQ];const ok=q.choices[i]===q.answer;document.querySelectorAll('.choice-btn').forEach(b=>b.disabled=true);document.getElementById(`ck-${i}`).classList.add(ok?'correct':'wrong');if(!ok){const ci=q.choices.indexOf(q.answer);document.getElementById(`ck-${ci}`).classList.add('correct')}record(ok)}

function rCS(el,q){const n=q.choices.length;const gridClass=n===2?'choice-grid-2':'choice-grid-3';el.innerHTML=`<div class="question-text">${q.qText}</div><div class="${gridClass}">${q.choices.map((c,i)=>`<button class="choice-btn" id="cs-${i}" onclick="pickCS(${i})" style="font-size:.95rem;padding:12px 6px">${c}</button>`).join('')}</div>`}
function pickCS(i){if(answered)return;answered=true;const q=questions[currentQ];const ok=q.choices[i]===q.answer;document.querySelectorAll('.choice-btn').forEach(b=>b.disabled=true);document.getElementById(`cs-${i}`).classList.add(ok?'correct':'wrong');if(!ok){const ci=q.choices.indexOf(q.answer);document.getElementById(`cs-${ci}`).classList.add('correct')}record(ok)}

// Word problem FULL: step-by-step formula input (①num ②op ③num ④answer)
let wpStep=0,wpN1='',wpOp='',wpN2='',wpAns='';
function rWordFull(el,q){
  wpStep=0;wpN1='';wpOp='';wpN2='';wpAns='';
  const hasX=grade==='grade2';
  el.innerHTML=`<div style="font-size:.9rem;line-height:1.7;text-align:left;max-width:380px;margin:0 auto 8px;padding:10px 12px;background:#f8f9fa;border-radius:12px">${q.text}</div>
  <div style="text-align:center;margin-bottom:6px">
    <div style="display:flex;align-items:center;justify-content:center;gap:4px;font-size:1.3rem;font-weight:900">
      <span style="font-size:.7rem;color:var(--text-soft)">しき</span>
      <span id="wf-n1" style="min-width:28px;border-bottom:3px solid var(--blue);color:var(--blue);padding:1px 3px;text-align:center">?</span>
      <span id="wf-op" style="min-width:22px;color:var(--text-soft)">○</span>
      <span id="wf-n2" style="min-width:28px;border-bottom:3px solid var(--blue);color:var(--blue);padding:1px 3px;text-align:center">?</span>
      <span style="color:var(--orange)">=</span>
      <span id="wf-res" style="min-width:28px;color:var(--text-soft)">?</span>
      <span style="margin-left:6px;font-size:.7rem;color:var(--text-soft)">こたえ</span>
      <span id="wf-ans" style="min-width:28px;border-bottom:3px solid var(--green);color:var(--green);padding:1px 3px;text-align:center">?</span>
      <span style="font-size:.75rem;color:var(--text-soft)">${q.unit}</span>
    </div>
  </div>
  <div style="text-align:center;font-size:.85rem;font-weight:700;color:var(--blue);margin-bottom:6px" id="wf-guide">① さいしょの かずを いれてね</div>
  <div id="wf-input">
    <div class="numpad">${[1,2,3,4,5,6,7,8,9].map(n=>`<button class="numpad-btn" onclick="wfIn(${n})">${n}</button>`).join('')}<button class="numpad-btn clear-btn" onclick="wfCl()">けす</button><button class="numpad-btn" onclick="wfIn(0)">0</button><button class="numpad-btn enter-btn" onclick="wfNext()">OK</button></div>
  </div>`;
}
function wfIn(n){if(answered)return;sndClick();
  if(wpStep===1)return;
  const maxLen=wpStep===3?3:2;
  if(wpStep===0){if(wpN1.length>=maxLen)return;wpN1+=String(n);document.getElementById('wf-n1').textContent=wpN1;document.getElementById('wf-n1').style.color='var(--text)'}
  else if(wpStep===2){if(wpN2.length>=maxLen)return;wpN2+=String(n);document.getElementById('wf-n2').textContent=wpN2;document.getElementById('wf-n2').style.color='var(--text)'}
  else if(wpStep===3){if(wpAns.length>=3)return;wpAns+=String(n);document.getElementById('wf-ans').textContent=wpAns;document.getElementById('wf-ans').style.color='var(--text)'}
}
function wfCl(){if(answered)return;sndClick();
  if(wpStep===0){wpN1='';document.getElementById('wf-n1').textContent='?';document.getElementById('wf-n1').style.color='var(--blue)'}
  else if(wpStep===2){wpN2='';document.getElementById('wf-n2').textContent='?';document.getElementById('wf-n2').style.color='var(--blue)'}
  else if(wpStep===3){wpAns='';document.getElementById('wf-ans').textContent='?';document.getElementById('wf-ans').style.color='var(--green)'}
}
function wfNext(){if(answered)return;sndClick();
  const hasX=grade==='grade2';
  if(wpStep===0&&wpN1!==''){
    wpStep=1;document.getElementById('wf-guide').textContent='② きごうを えらんでね';
    document.getElementById('wf-input').innerHTML=`<div style="display:flex;gap:10px;justify-content:center"><button class="choice-btn" style="font-size:1.6rem;padding:14px 24px" onclick="wfOp('+')">＋</button><button class="choice-btn" style="font-size:1.6rem;padding:14px 24px" onclick="wfOp('−')">−</button>${hasX?'<button class="choice-btn" style="font-size:1.6rem;padding:14px 24px" onclick="wfOp(\'×\')">×</button>':''}</div>`;
  }else if(wpStep===2&&wpN2!==''){
    wpStep=3;const n1=parseInt(wpN1),n2=parseInt(wpN2);
    const res=wpOp==='+'?n1+n2:wpOp==='−'?n1-n2:n1*n2;
    document.getElementById('wf-res').textContent=res;document.getElementById('wf-res').style.color='var(--text)';
    document.getElementById('wf-guide').textContent='④ こたえを いれてね';
    document.getElementById('wf-input').innerHTML=`<div class="numpad">${[1,2,3,4,5,6,7,8,9].map(n=>`<button class="numpad-btn" onclick="wfIn(${n})">${n}</button>`).join('')}<button class="numpad-btn clear-btn" onclick="wfCl()">けす</button><button class="numpad-btn" onclick="wfIn(0)">0</button><button class="numpad-btn enter-btn" onclick="wfSubmit()">OK</button></div>`;
  }
}
function wfOp(op){if(answered)return;sndClick();
  wpOp=op;wpStep=2;const sym=op==='+'?'＋':op==='−'?'−':'×';
  document.getElementById('wf-op').textContent=sym;document.getElementById('wf-op').style.color='var(--blue)';
  document.getElementById('wf-guide').textContent='③ つぎの かずを いれてね';
  document.getElementById('wf-input').innerHTML=`<div class="numpad">${[1,2,3,4,5,6,7,8,9].map(n=>`<button class="numpad-btn" onclick="wfIn(${n})">${n}</button>`).join('')}<button class="numpad-btn clear-btn" onclick="wfCl()">けす</button><button class="numpad-btn" onclick="wfIn(0)">0</button><button class="numpad-btn enter-btn" onclick="wfNext()">OK</button></div>`;
}
function wfSubmit(){if(answered||wpAns==='')return;answered=true;
  const q=questions[currentQ];const n1=parseInt(wpN1),n2=parseInt(wpN2),ans=parseInt(wpAns);
  const exprOk=(n1===q.wpA&&wpOp===q.correctOp&&n2===q.wpB);const ansOk=(ans===q.answer);const ok=exprOk&&ansOk;
  document.querySelectorAll('.numpad-btn,.choice-btn').forEach(b=>b.disabled=true);
  document.getElementById('wf-guide').textContent=ok?'🎉 せいかい！':`こたえ：${q.wpA} ${q.correctOp==='+'?'＋':q.correctOp==='−'?'−':'×'} ${q.wpB} = ${q.answer}`;
  document.getElementById('wf-guide').style.color=ok?'var(--green)':'var(--red)';
  record(ok);
}

// Word problem OP only: just pick the operation
function rWordOp(el,q){
  const hasMultiply=grade==='grade2';
  el.innerHTML=`<div style="font-size:.9rem;line-height:1.7;text-align:left;max-width:380px;margin:0 auto 12px;padding:10px 12px;background:#f8f9fa;border-radius:12px">${q.text}</div>
  <div class="question-text" style="font-size:1rem">どの けいさんを つかう？</div>
  <div style="display:flex;gap:10px;justify-content:center">
    <button class="choice-btn" id="wop-0" onclick="pickWOp('+')" style="font-size:1.6rem;padding:14px 24px">＋</button>
    <button class="choice-btn" id="wop-1" onclick="pickWOp('−')" style="font-size:1.6rem;padding:14px 24px">−</button>
    ${hasMultiply?'<button class="choice-btn" id="wop-2" onclick="pickWOp(\'×\')" style="font-size:1.6rem;padding:14px 24px">×</button>':''}
  </div>`}
function pickWOp(op){if(answered)return;answered=true;const q=questions[currentQ];const ok=op===q.correctOp;
  document.querySelectorAll('.choice-btn').forEach(b=>b.disabled=true);
  const ops=['+','−','×'],idx=ops.indexOf(op);
  document.getElementById(`wop-${idx}`).classList.add(ok?'correct':'wrong');
  if(!ok){const ci=ops.indexOf(q.correctOp);document.getElementById(`wop-${ci}`).classList.add('correct')}
  record(ok)}

// ========== ADAPTIVE RECORD ==========
function record(ok){
  const q=questions[currentQ];
  if(!unitResults[q.unitId])unitResults[q.unitId]=0;
  if(ok){unitResults[q.unitId]++;sndOk()}else{sndNg()}

  // After 1st question, fill in the placeholder with adaptive 2nd question
  if(q._phase===1){
    const unit=q._unitRef;
    const q2=ok?unit.hard():unit.easy();
    q2._unitRef=unit;q2._phase=2;
    questions[currentQ+1]=q2;
  }

  setTimeout(()=>{currentQ++;if(currentQ>=questions.length){showResult();return}renderQ()},ok?800:1200);
}

// ========== RESULT ==========
function showResult(){
  document.getElementById('quizScreen').classList.add('hidden');
  document.getElementById('resultScreen').classList.remove('hidden');
  const cfg=GRADES[grade];
  const scores={};cfg.units.forEach(u=>{scores[u.id]=unitResults[u.id]||0});
  const totalCorrect=Object.values(scores).reduce((a,b)=>a+b,0);
  const totalQ=cfg.units.length*2;

  // Radar chart
  const axes=cfg.units;
  const n=axes.length,cx=160,cy=160,r=100;
  const angles=axes.map((_,i)=>(i*(360/n)-90)*Math.PI/180);
  let svg=`<svg viewBox="0 0 320 320" width="280" height="280">`;
  for(let lv=0.5;lv<=1;lv+=0.5){const pts=angles.map(a=>`${cx+Math.cos(a)*r*lv},${cy+Math.sin(a)*r*lv}`).join(' ');svg+=`<polygon points="${pts}" fill="none" stroke="#e0e0e0" stroke-width="1"/>`}
  angles.forEach(a=>{svg+=`<line x1="${cx}" y1="${cy}" x2="${cx+Math.cos(a)*r}" y2="${cy+Math.sin(a)*r}" stroke="#e0e0e0" stroke-width="1"/>`});
  axes.forEach((ax,i)=>{const lx=cx+Math.cos(angles[i])*(r+28),ly=cy+Math.sin(angles[i])*(r+28);svg+=`<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="700" fill="#636e72" font-family="Zen Maru Gothic,sans-serif">${cfg.chartLabel[i]}</text>`});
  const dataPts=axes.map((ax,i)=>{const val=(scores[ax.id]||0)/2;return`${cx+Math.cos(angles[i])*r*val},${cy+Math.sin(angles[i])*r*val}`}).join(' ');
  svg+=`<polygon points="${dataPts}" fill="rgba(245,158,11,.15)" stroke="#f59e0b" stroke-width="2.5"/>`;
  axes.forEach((ax,i)=>{const val=(scores[ax.id]||0)/2;const px=cx+Math.cos(angles[i])*r*val,py=cy+Math.sin(angles[i])*r*val;const color=val>=1?'#22c55e':val>=0.5?'#f59e0b':'#ef4444';svg+=`<circle cx="${px}" cy="${py}" r="5" fill="${color}" stroke="#fff" stroke-width="2"/>`});
  svg+=`</svg>`;

  // Generate report
  const reportText=cfg.genReport(scores);

  if(totalCorrect===totalQ){showConfetti();sndFanfare()}

  document.getElementById('resultContent').innerHTML=`
    <div class="result-icon">${totalCorrect===totalQ?'🏆':totalCorrect>=totalQ*0.7?'💪':'📊'}</div>
    <div class="result-title" style="color:${totalCorrect===totalQ?'#2b8a3e':'var(--blue)'}">しんだん けっか</div>
    <div style="font-size:.9rem;color:var(--text-soft);margin-bottom:8px">${totalCorrect}もん せいかい / ${totalQ}もん</div>
    <div class="chart-container">${svg}</div>
    <div class="diag-box">
      <div class="diag-title">📋 お子さまの学習傾向</div>
      <div style="text-align:center;font-size:.8rem;color:#b45309;margin-bottom:10px">👨‍👩‍👧 保護者の方へ</div>
      <div class="diag-text">${reportText.replace(/\n/g,'<br>')}</div>
    </div>
    <div class="btn-group" style="margin-top:20px">
      <a href="${cfg.link}" class="btn btn-orange" style="text-decoration:none">📐 くわしく れんしゅう →</a>
      <a href="index.html" class="btn btn-blue" style="text-decoration:none">🏠 トップへ</a>
    </div>`;
  window.scrollTo({top:0,behavior:'smooth'});
}

function showConfetti(){const c=document.getElementById('confettiContainer');const es=['🎉','⭐','🌟','✨','🎊','💫'];for(let i=0;i<30;i++){const el=document.createElement('span');el.className='confetti';el.textContent=es[Math.floor(Math.random()*es.length)];el.style.left=Math.random()*100+'%';el.style.animationDuration=(1.5+Math.random()*2)+'s';el.style.animationDelay=(Math.random()*.8)+'s';el.style.fontSize=(1+Math.random()*1.5)+'rem';c.appendChild(el)}setTimeout(()=>{c.innerHTML=''},4000)}
</script>
