<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>さんすう れんしゅう（小学2年生）</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root{--pink:#ff6b9d;--blue:#4ea8de;--blue-light:#e8f4fd;--green:#51cf66;--green-light:#e6fcf0;--yellow-light:#fff9db;--orange:#ff922b;--red:#ff6b6b;--bg:#edf7ff;--card:#fff;--text:#2d3436;--text-soft:#636e72;--shadow:0 4px 20px rgba(0,0,0,.06);--radius:20px}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Zen Maru Gothic','Hiragino Kaku Gothic ProN',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:16px;overflow-x:hidden}
  .container{max-width:560px;margin:0 auto}
  .header{text-align:center;padding:10px 16px 8px}.header-icon{font-size:2.2rem}.header h1{font-size:1.4rem;font-weight:900;color:#2563eb;margin-top:4px}.header p{color:var(--text-soft);font-size:.85rem;margin-top:2px;font-weight:700}
  .card{background:var(--card);border-radius:var(--radius);padding:18px 16px;margin-bottom:12px;box-shadow:var(--shadow)}
  .menu-grid{display:flex;flex-direction:column;gap:8px}
  .menu-item{display:flex;align-items:center;gap:12px;padding:12px;border:2.5px solid #e0e0e0;border-radius:16px;cursor:pointer;transition:all .15s;background:#fff}.menu-item:active{transform:scale(.97)}
  .menu-icon{font-size:1.8rem;flex-shrink:0}.menu-label{font-size:.95rem;font-weight:700}.menu-desc{font-size:.75rem;color:var(--text-soft);margin-top:2px}
  .menu-item.c1{border-color:#fca5a5}.menu-item.c2{border-color:#93c5fd}.menu-item.c3{border-color:#fcd34d}.menu-item.c4{border-color:#86efac}.menu-item.c5{border-color:#c4b5fd}.menu-item.c6{border-color:#fdba74}.menu-item.c7{border-color:#f9a8d4}
  @media(hover:hover){.menu-item:hover{transform:scale(1.02);box-shadow:0 2px 12px rgba(0,0,0,.08)}}
  .question-number{text-align:center;font-size:.85rem;font-weight:700;color:var(--blue);margin-bottom:10px}
  .progress-bar{display:flex;justify-content:center;gap:6px;margin-bottom:12px}
  .progress-dot{width:12px;height:12px;border-radius:50%;background:#e0e0e0;transition:all .3s}.progress-dot.active{background:var(--blue);transform:scale(1.2)}.progress-dot.correct{background:var(--green)}.progress-dot.wrong{background:var(--red)}

  /* Hissan grid - right-aligned digits */
  .hissan-grid{display:inline-grid;grid-template-columns:repeat(4,32px);gap:0;text-align:center;font-size:1.8rem;font-weight:900;font-family:'Courier New',monospace;line-height:2;margin:12px auto;justify-content:center}
  .hissan-grid .hg-cell{display:flex;align-items:center;justify-content:center}
  .hissan-grid .hg-op{color:var(--blue)}
  .hissan-grid .hg-line{grid-column:1/-1;border-top:3px solid var(--text);height:4px}
  .hissan-grid .hg-ans{color:var(--blue)}
  .hissan-grid .hg-ans.correct-ans{color:var(--green)}
  .hissan-grid .hg-ans.wrong-ans{color:var(--red);text-decoration:line-through}
  .hissan-grid .hg-correct-after{color:var(--green);animation:fadeIn .4s}
  .hissan-wrap{text-align:center}

  .problem-display{text-align:center;padding:16px 8px;font-size:2rem;font-weight:900;letter-spacing:2px}
  .problem-display .op{color:var(--blue);margin:0 4px}.problem-display .eq{color:var(--orange);margin:0 4px}
  .problem-display .answer-box{display:inline-block;min-width:60px;border-bottom:4px solid var(--blue);color:var(--blue);padding:0 4px;margin-left:4px}.problem-display .answer-box.filled{color:var(--text)}.problem-display .answer-box.correct-ans{border-color:var(--green);color:var(--green)}.problem-display .answer-box.wrong-ans{border-color:var(--red);color:var(--red);text-decoration:line-through}
  .problem-display .correct-after{display:inline-block;color:var(--green);font-size:2rem;font-weight:900;margin-left:8px;animation:fadeIn .4s}
  .question-text{text-align:center;font-size:1.1rem;font-weight:900;margin:8px 0 16px}
  .numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:280px;margin:0 auto}
  .numpad-btn{padding:14px;border:2.5px solid #e0e0e0;border-radius:14px;background:#fff;font-size:1.4rem;font-weight:900;font-family:inherit;color:var(--text);cursor:pointer;transition:all .15s;text-align:center}
  @media(hover:hover){.numpad-btn:hover{border-color:var(--blue);background:var(--blue-light)}}@media(hover:none){.numpad-btn:hover{border-color:#e0e0e0;background:#fff}}
  .numpad-btn:active{transform:scale(.95)}.numpad-btn:disabled{opacity:.5;cursor:default}.numpad-btn.enter-btn{background:var(--blue);color:#fff;border-color:var(--blue)}.numpad-btn.clear-btn{background:#f8f9fa;color:var(--text-soft);border-color:#ddd;font-size:1rem}
  .choice-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;max-width:420px;margin:0 auto}
  .choice-btn{border:3px solid #e0e0e0;border-radius:16px;background:#fff;font-weight:700;font-family:inherit;color:var(--text);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;padding:14px 8px;font-size:.95rem}
  @media(hover:hover){.choice-btn:hover{border-color:var(--blue);background:var(--blue-light);transform:scale(1.03)}}@media(hover:none){.choice-btn:hover{border-color:#e0e0e0;background:#fff;transform:none}}
  .choice-btn:active{transform:scale(.95)}.choice-btn.correct{border-color:var(--green);background:var(--green-light);color:var(--green)}.choice-btn.wrong{border-color:var(--red);background:#fff0f0;color:var(--red);animation:shake .4s}.choice-btn:disabled{cursor:default;opacity:.7}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
  @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .result-banner{margin-top:16px;padding:18px;border-radius:16px;text-align:center;font-weight:900;font-size:1.3rem;display:none}.result-banner.show{display:block;animation:bannerIn .4s}
  @keyframes bannerIn{0%{opacity:0;transform:scale(.9)}100%{opacity:1;transform:scale(1)}}
  .result-banner.correct-banner{background:var(--green-light);color:#2b8a3e;border:2.5px solid #86efac}.result-banner.wrong-banner{background:#fff0f0;color:#c92a2a;border:2.5px solid #fca5a5}
  .result-banner .banner-icon{font-size:2rem;display:block;margin-bottom:4px}.result-banner .banner-sub{font-size:.9rem;font-weight:700;margin-top:4px;color:var(--text-soft)}
  .result-screen{text-align:center;padding:28px 16px}.result-icon{font-size:3.5rem;margin-bottom:10px}.result-title{font-size:1.4rem;font-weight:900;margin-bottom:8px}.result-message{font-size:.95rem;color:var(--text-soft);line-height:1.7;margin-bottom:16px}
  .result-score{display:flex;justify-content:center;gap:6px;margin-bottom:16px}.result-score-dot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8rem}.result-score-dot.s-correct{background:var(--green-light);color:#2b8a3e}.result-score-dot.s-wrong{background:#ffe0e0;color:#c92a2a}

  .review-item{background:#fff;border:2px solid #fca5a5;border-radius:14px;padding:14px;margin-bottom:10px}.review-q{font-weight:700;font-size:.95rem;margin-bottom:4px}.review-ans{font-size:.88rem;color:#2b8a3e;font-weight:700;margin-bottom:8px}
  .review-anim-btn{display:block;width:100%;padding:10px;border:2px solid var(--orange);border-radius:12px;background:var(--yellow-light);font-family:inherit;font-size:.9rem;font-weight:700;color:#b45309;cursor:pointer;text-align:center}.review-anim-btn:active{transform:scale(.97)}
  .review-anim-area{margin-top:10px;display:none}.review-anim-area.show{display:block;animation:fadeIn .4s}
  .anim-stage{background:var(--yellow-light);border:2px solid #ffe066;border-radius:16px;padding:16px 12px;text-align:center}
  .anim-msg{font-size:.95rem;font-weight:900;min-height:22px;margin-bottom:10px}.anim-msg.blue{color:#3b82f6}.anim-msg.green{color:#22c55e}.anim-msg.orange{color:#f59e0b}.anim-msg.red{color:#e74c3c}
  .anim-result{font-size:1.2rem;font-weight:900;color:#22c55e;margin-top:10px;opacity:0;transition:opacity .4s}.anim-result.show{opacity:1}
  .anim-row{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin:4px 0;transition:all .4s}
  .ab{width:24px;height:24px;border-radius:6px;transition:all .4s;flex-shrink:0}.ab.blue{background:linear-gradient(135deg,#4ea8de,#3b82f6)}.ab.green{background:linear-gradient(135deg,#51cf66,#22c55e)}
  /* Anim hissan */
  .ah-grid{display:inline-grid;grid-template-columns:repeat(4,28px);gap:0;font-size:1.4rem;font-weight:900;font-family:'Courier New',monospace;line-height:1.8;margin:8px auto}
  .ah-cell{display:flex;align-items:center;justify-content:center;transition:all .4s;opacity:.3}
  .ah-cell.lit{opacity:1}.ah-cell.green{color:var(--green)}.ah-cell.op{color:var(--blue);opacity:1}
  .ah-carry{font-size:1rem;color:var(--red);opacity:0;transition:opacity .4s;text-align:center;font-weight:900}.ah-carry.show{opacity:1}
  .shape-svg{display:block;margin:8px auto}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 24px;border:none;border-radius:14px;font-size:1rem;font-weight:700;font-family:inherit;cursor:pointer;transition:all .15s}.btn:active{transform:scale(.96)}.btn-pink{background:var(--pink);color:#fff}.btn-blue{background:var(--blue);color:#fff}.btn-green{background:var(--green);color:#fff}
  .btn-group{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:14px}
  .hidden{display:none!important}
  .philosophy{text-align:center;padding:16px;color:var(--text-soft);font-size:.82rem;line-height:1.7}.philosophy strong{color:#2563eb}
  .confetti-container{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1100;overflow:hidden}.confetti{position:absolute;top:-20px;font-size:1.5rem;animation:confettiFall linear forwards}@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
  .back-btn{position:absolute;top:8px;left:8px;background:none;border:none;font-size:1.2rem;cursor:pointer;padding:4px 8px;font-family:inherit;font-weight:700;color:var(--text-soft)}.quiz-wrapper{position:relative;padding-top:32px}
</style>
</head>
<body>
<div class="container">
  <div id="menuScreen">
    <div class="header"><div class="header-icon">📐</div><h1>さんすう れんしゅう</h1><p>小学2年生</p></div>
    <div class="card"><p style="text-align:center;font-weight:700;margin-bottom:12px;font-size:.95rem">にがてな ところを えらんでね！</p>
      <div class="menu-grid">
        <div class="menu-item c1" onclick="startUnit('kuku')"><div class="menu-icon">✖️</div><div><div class="menu-label">かけざん（九九）</div><div class="menu-desc">3×7 のような もんだい</div></div></div>
        <div class="menu-item c2" onclick="startUnit('add_h')"><div class="menu-icon">➕</div><div><div class="menu-label">たしざんの ひっさん</div><div class="menu-desc">2〜3けたの たしざん</div></div></div>
        <div class="menu-item c3" onclick="startUnit('sub_h')"><div class="menu-icon">➖</div><div><div class="menu-label">ひきざんの ひっさん</div><div class="menu-desc">2〜3けたの ひきざん</div></div></div>
        <div class="menu-item c4" onclick="startUnit('time')"><div class="menu-icon">🕐</div><div><div class="menu-label">じこくと じかん</div><div class="menu-desc">〇ふんご・〇ふんまえ</div></div></div>
        <div class="menu-item c5" onclick="startUnit('length')"><div class="menu-icon">📏</div><div><div class="menu-label">ながさの たんい</div><div class="menu-desc">mm・cm・m</div></div></div>
        <div class="menu-item c6" onclick="startUnit('volume')"><div class="menu-icon">🥤</div><div><div class="menu-label">かさの たんい</div><div class="menu-desc">mL・dL・L</div></div></div>
        <div class="menu-item c7" onclick="startUnit('shapes')"><div class="menu-icon">▢</div><div><div class="menu-label">図形のなまえ</div><div class="menu-desc">正方形・長方形・三角形</div></div></div>
      </div>
    </div>
    <div class="philosophy">れんしゅうすれば かならず できるようになるよ！<br><strong>だいじなのは、やりかただけ。</strong></div>
  </div>
  <div id="quizScreen" class="hidden"><div class="card quiz-wrapper"><button class="back-btn" onclick="backToMenu()">← もどる</button><div class="progress-bar" id="progressBar"></div><div class="question-number" id="questionNumber"></div><div id="quizContent"></div><div class="result-banner" id="resultBanner"></div><div class="btn-group hidden" id="nextBtnGroup"><button class="btn btn-blue" id="nextBtn" onclick="nextQuestion()">つぎの もんだい →</button></div></div></div>
  <div id="resultScreen" class="hidden"><div class="card result-screen" id="resultContent"></div></div>
</div>
<div class="confetti-container" id="confettiContainer"></div>
<script>
const AC=window.AudioContext||window.webkitAudioContext;let ac;function ea(){if(!ac)ac=new AC}
function sndOk(){ea();[523.25,659.25,783.99].forEach((f,i)=>{const o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(.3,ac.currentTime+i*.12);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+i*.12+.4);o.start(ac.currentTime+i*.12);o.stop(ac.currentTime+i*.12+.4)})}
function sndNg(){ea();[329.63,261.63].forEach((f,i)=>{const o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(.2,ac.currentTime+i*.15);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+i*.15+.35);o.start(ac.currentTime+i*.15);o.stop(ac.currentTime+i*.15+.35)})}
function sndFanfare(){ea();[523.25,659.25,783.99,1046.5].forEach((f,i)=>{const o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.type='triangle';o.frequency.value=f;g.gain.setValueAtTime(.3,ac.currentTime+i*.15);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+i*.15+.5);o.start(ac.currentTime+i*.15);o.stop(ac.currentTime+i*.15+.5)})}
function sndClick(){ea();const o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.type='sine';o.frequency.value=800;g.gain.setValueAtTime(.15,ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.08);o.start(ac.currentTime);o.stop(ac.currentTime+.08)}
function sndPop(f=600){ea();const o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(.2,ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.15);o.start(ac.currentTime);o.stop(ac.currentTime+.15)}
function sndTick(){ea();const o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.type='sine';o.frequency.value=1200;g.gain.setValueAtTime(.1,ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.06);o.start(ac.currentTime);o.stop(ac.currentTime+.06)}
const sl=ms=>new Promise(r=>setTimeout(r,ms));
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a}

const TOTAL=5;let unitType='',questions=[],currentQ=0,results=[],phase='main',retryQs=[],retryResults=[],answered=false,questionLog=[],inputVal='';

// SVG helpers
function shapeSVG(type,w=160,h=120){
  if(type==='square') return `<svg class="shape-svg" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><rect x="${(w-70)/2}" y="${(h-70)/2}" width="70" height="70" fill="#dbeafe" stroke="#3b82f6" stroke-width="3" rx="2"/></svg>`;
  if(type==='rect') return `<svg class="shape-svg" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><rect x="${(w-110)/2}" y="${(h-50)/2}" width="110" height="50" fill="#fef3c7" stroke="#f59e0b" stroke-width="3" rx="2"/></svg>`;
  if(type==='triangle') return `<svg class="shape-svg" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><polygon points="${w/2},${(h-80)/2} ${(w-90)/2},${(h+80)/2} ${(w+90)/2},${(h+80)/2}" fill="#d1fae5" stroke="#22c55e" stroke-width="3" stroke-linejoin="round"/></svg>`;
  return '';
}
function drawClockSVG(hA,mA,sz){const cx=sz/2,cy=sz/2,r=sz/2-12;let s=`<svg viewBox="0 0 ${sz} ${sz}" width="${sz}" height="${sz}"><circle cx="${cx}" cy="${cy}" r="${r}" fill="#fff" stroke="#333" stroke-width="2.5"/>`;for(let i=1;i<=12;i++){const a=(i*30-90)*Math.PI/180;s+=`<line x1="${cx+Math.cos(a)*(r-4)}" y1="${cy+Math.sin(a)*(r-4)}" x2="${cx+Math.cos(a)*(r-12)}" y2="${cy+Math.sin(a)*(r-12)}" stroke="#333" stroke-width="2" stroke-linecap="round"/><text x="${cx+Math.cos(a)*(r-22)}" y="${cy+Math.sin(a)*(r-22)}" text-anchor="middle" dominant-baseline="central" font-size="${sz>150?14:11}" font-weight="900" fill="#333" font-family="Zen Maru Gothic,sans-serif">${i}</text>`}const ha=(hA-90)*Math.PI/180;s+=`<line x1="${cx}" y1="${cy}" x2="${cx+Math.cos(ha)*r*.4}" y2="${cy+Math.sin(ha)*r*.4}" stroke="#e74c3c" stroke-width="5" stroke-linecap="round"/>`;const ma=(mA-90)*Math.PI/180;s+=`<line x1="${cx}" y1="${cy}" x2="${cx+Math.cos(ma)*r*.6}" y2="${cy+Math.sin(ma)*r*.6}" stroke="#2980b9" stroke-width="3" stroke-linecap="round"/><circle cx="${cx}" cy="${cy}" r="4" fill="#333"/></svg>`;return s}

// Build hissan HTML (right-aligned grid)
function hissanHTML(a,b,opChar,ansId){
  const digits=Math.max(String(a).length,String(b).length,String(a+b).length);
  const w=digits+1;// +1 for op
  const aArr=String(a).padStart(digits,' ').split('');
  const bArr=String(b).padStart(digits,' ').split('');
  let html=`<div class="hissan-wrap"><div class="hissan-grid" style="grid-template-columns:repeat(${w},32px)">`;
  // Row 1: a (with empty op column)
  html+=`<div class="hg-cell"></div>`;
  aArr.forEach(d=>{html+=`<div class="hg-cell">${d===' '?'':d}</div>`});
  // Row 2: op + b
  html+=`<div class="hg-cell hg-op">${opChar}</div>`;
  bArr.forEach(d=>{html+=`<div class="hg-cell">${d===' '?'':d}</div>`});
  // Line
  html+=`<div class="hg-line" style="grid-column:1/-1"></div>`;
  // Answer row
  html+=`<div class="hg-cell"></div>`;
  for(let i=0;i<digits;i++) html+=`<div class="hg-cell hg-ans" id="${ansId}-${i}">?</div>`;
  html+=`</div></div>`;
  return html;
}

// === GENERATORS (with duplicate prevention) ===
function genKuku(prev){let a,b;do{a=rnd(2,9);b=rnd(2,9)}while(prev&&prev.a===a&&prev.b===b);return{type:'numpad',subtype:'kuku',a,b,op:'×',answer:a*b,qText:`${a} × ${b} = ?`}}
function genAddH(prev){let a,b;do{a=rnd(15,99);b=rnd(15,99)}while(prev&&prev.a===a&&prev.b===b);return{type:'hissan',subtype:'add_h',a,b,op:'+',answer:a+b,qText:`${a} + ${b} = ?`}}
function genSubH(prev){let a,b;do{a=rnd(30,99);b=rnd(11,a-5)}while(prev&&prev.a===a&&prev.b===b);return{type:'hissan',subtype:'sub_h',a,b,op:'−',answer:a-b,qText:`${a} − ${b} = ?`}}
function genTime(prev){
  let h,m,addMin;
  do{h=rnd(1,11);m=rnd(0,5)*10;addMin=rnd(1,5)*10}while(prev&&prev.h===h&&prev.m===m&&prev.addMin===addMin);
  const totalMin=h*60+m+addMin;const nh=Math.floor(totalMin/60)%12||12;const nm=totalMin%60;
  const hA1=(h%12)*30+m*0.5,mA1=m*6,hA2=(nh%12)*30+nm*0.5,mA2=nm*6;
  const label=nm>0?`${nh}じ${nm}ふん`:`${nh}じ`;
  const startLabel=m>0?`${h}じ${m}ふん`:`${h}じ`;
  // Close choices: ±10 or ±20 min
  const choices=[label];
  const offsets=[-20,-10,10,20].sort(()=>Math.random()-.5);
  for(const off of offsets){
    if(choices.length>=3)break;
    const cm=totalMin+off;if(cm<60||cm>12*60)continue;
    const ch=Math.floor(cm/60)%12||12,cmin=cm%60;
    const cl=cmin>0?`${ch}じ${cmin}ふん`:`${ch}じ`;
    if(!choices.includes(cl))choices.push(cl);
  }
  while(choices.length<3){const ch=rnd(1,12),cm2=rnd(0,5)*10;const cl=cm2>0?`${ch}じ${cm2}ふん`:`${ch}じ`;if(!choices.includes(cl))choices.push(cl)}
  for(let i=choices.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[choices[i],choices[j]]=[choices[j],choices[i]]}
  return{type:'choice',subtype:'time',qText:`${startLabel}の ${addMin}ふんご は？`,answer:label,choices,startLabel,h,m,addMin,hA1,mA1,hA2,mA2,totalMinStart:h*60+m,totalMinEnd:totalMin}
}
function genLength(prev){
  const items=[
    {q:'1mは なんcm？',answer:'100cm',choices:['10cm','100cm','1000cm'],explain:'1m = 100cm だよ'},
    {q:'30mmは なんcm？',answer:'3cm',choices:['3cm','30cm','300cm'],explain:'10mm = 1cm だから、30mm = 3cm'},
    {q:'5cmは なんmm？',answer:'50mm',choices:['5mm','50mm','500mm'],explain:'1cm = 10mm だから、5cm = 50mm'},
    {q:'200cmは なんm？',answer:'2m',choices:['2m','20m','200m'],explain:'100cm = 1m だから、200cm = 2m'},
    {q:'1m30cmは なんcm？',answer:'130cm',choices:['13cm','103cm','130cm'],explain:'1m = 100cm だから、100 + 30 = 130cm'},
  ];let item;do{item=items[rnd(0,items.length-1)]}while(prev&&prev.qText===item.q);
  const ch=[...item.choices];for(let i=ch.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[ch[i],ch[j]]=[ch[j],ch[i]]}
  return{type:'choice',subtype:'length',qText:item.q,answer:item.answer,choices:ch,explain:item.explain}
}
function genVolume(prev){
  const items=[
    {q:'1Lは なんmL？',answer:'1000mL',choices:['100mL','1000mL','10000mL'],explain:'1L = 1000mL だよ'},
    {q:'1Lは なんdL？',answer:'10dL',choices:['1dL','10dL','100dL'],explain:'1L = 10dL だよ'},
    {q:'5dLは なんmL？',answer:'500mL',choices:['50mL','500mL','5000mL'],explain:'1dL = 100mL だから、5dL = 500mL'},
    {q:'2000mLは なんL？',answer:'2L',choices:['2L','20L','200L'],explain:'1000mL = 1L だから、2000mL = 2L'},
    {q:'3Lは なんdL？',answer:'30dL',choices:['3dL','30dL','300dL'],explain:'1L = 10dL だから、3L = 30dL'},
  ];let item;do{item=items[rnd(0,items.length-1)]}while(prev&&prev.qText===item.q);
  const ch=[...item.choices];for(let i=ch.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[ch[i],ch[j]]=[ch[j],ch[i]]}
  return{type:'choice',subtype:'volume',qText:item.q,answer:item.answer,choices:ch,explain:item.explain}

function genShapes(prev){
  const items=[
    {q:'この 図形の なまえは？',shape:'square',answer:'正方形',choices:['正方形','長方形','三角形']},
    {q:'この 図形の なまえは？',shape:'rect',answer:'長方形',choices:['正方形','長方形','三角形']},
    {q:'この 図形の なまえは？',shape:'triangle',answer:'三角形',choices:['正方形','長方形','三角形']},
  ];let item;do{item=items[rnd(0,items.length-1)]}while(prev&&prev.shape===item.shape);
  const ch=[...item.choices];for(let i=ch.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[ch[i],ch[j]]=[ch[j],ch[i]]}
  return{type:'choice',subtype:'shapes',qText:item.q,answer:item.answer,choices:ch,shape:item.shape}
}
function generateQs(n,type){const qs=[];for(let i=0;i<n;i++){const prev=i>0?qs[i-1]:null;let q;switch(type){case'kuku':q=genKuku(prev);break;case'add_h':q=genAddH(prev);break;case'sub_h':q=genSubH(prev);break;case'time':q=genTime(prev);break;case'length':q=genLength(prev);break;case'volume':q=genVolume(prev);break;case'shapes':q=genShapes(prev);break}qs.push(q)}return qs}

// === REVIEW ANIMATIONS ===
function playRA(idx){
  const wrongItems=questionLog.filter(l=>!l.correct);const q=wrongItems[idx].question;
  const area=document.getElementById(`raa-${idx}`);const btn=document.getElementById(`rab-${idx}`);
  if(area.classList.contains('show')){area.classList.remove('show');area.innerHTML='';btn.textContent='🎬 かいせつアニメを みる';return}
  btn.textContent='⏳ さいせいちゅう…';btn.disabled=true;area.classList.add('show');
  switch(q.subtype){
    case'kuku':animKuku(area,q,btn,idx);break;
    case'add_h':animHissan(area,q,btn,idx,true);break;
    case'sub_h':animHissan(area,q,btn,idx,false);break;
    case'time':animTime(area,q,btn,idx);break;
    case'length':case'volume':animUnit(area,q,btn,idx);break;
    case'shapes':animShape(area,q,btn,idx);break;
  }
}

// KUKU: a個ずつ b回
async function animKuku(el,q,btn,idx){
  const a=q.a,b=q.b;
  let rows='';for(let g=0;g<b;g++) rows+=`<div class="anim-row" id="kr${idx}-${g}" style="opacity:.2">${Array.from({length:a},()=>'<div class="ab blue"></div>').join('')}</div>`;
  el.innerHTML=`<div class="anim-stage"><div class="anim-msg blue" id="xm${idx}">${a}こずつ ${b}かい かぞえるよ！</div><div style="margin:8px 0">${rows}</div><div class="anim-result" id="xr${idx}"></div></div>`;
  await sl(800);let total=0;
  for(let g=0;g<b;g++){document.getElementById(`kr${idx}-${g}`).style.opacity='1';total+=a;sndPop(500+g*40);document.getElementById(`xm${idx}`).textContent=`${a} × ${g+1} = ${total}`;await sl(500)}
  await sl(400);sndOk();document.getElementById(`xm${idx}`).textContent=`${a} × ${b} = ${a*b}！`;document.getElementById(`xm${idx}`).className='anim-msg green';
  el.querySelectorAll('.ab').forEach(d=>{d.classList.remove('blue');d.classList.add('green')});
  document.getElementById(`xr${idx}`).textContent=`こたえは ${a*b}`;document.getElementById(`xr${idx}`).classList.add('show');
  btn.disabled=false;btn.textContent='🎬 もういちど みる';
}

// HISSAN with carry/borrow - ゆっくりテンポ
async function animHissan(el,q,btn,idx,isAdd){
  const a=q.a,b=q.b,ans=q.answer;
  const digits=Math.max(String(a).length,String(b).length,String(ans).length);
  const aArr=String(a).padStart(digits,'0').split('').map(Number);
  const bArr=String(b).padStart(digits,'0').split('').map(Number);
  const ansArr=String(ans).padStart(digits,'0').split('').map(Number);
  const w=digits+1;
  const opChar=isAdd?'+':'−';

  let carryRow='';for(let i=0;i<w;i++) carryRow+=`<div class="ah-carry" id="hc${idx}-${i}"></div>`;
  let aRow=`<div class="ah-cell op" style="opacity:0"></div>`;aArr.forEach((d,i)=>{aRow+=`<div class="ah-cell" id="ha${idx}-${i}">${d||''}</div>`});
  let bRow=`<div class="ah-cell op">${opChar}</div>`;bArr.forEach((d,i)=>{bRow+=`<div class="ah-cell" id="hb${idx}-${i}">${d||''}</div>`});
  let ansRow=`<div class="ah-cell" style="opacity:0"></div>`;ansArr.forEach((d,i)=>{ansRow+=`<div class="ah-cell" id="hr${idx}-${i}">${d||''}</div>`});

  el.innerHTML=`<div class="anim-stage"><div class="anim-msg blue" id="xm${idx}">いちの くらいから けいさんするよ</div><div style="text-align:center"><div class="ah-grid" style="grid-template-columns:repeat(${w},28px)">${carryRow}${aRow}${bRow}<div style="grid-column:1/-1;border-top:3px solid var(--text);height:4px"></div>${ansRow}</div></div><div class="anim-result" id="xr${idx}"></div></div>`;
  await sl(1500);

  let carry=0;
  for(let col=digits-1;col>=0;col--){
    const colName=col===digits-1?'いちの くらい':col===digits-2?'十の くらい':'百の くらい';
    document.getElementById(`xm${idx}`).textContent=colName;
    const da=document.getElementById(`ha${idx}-${col}`);
    const db=document.getElementById(`hb${idx}-${col}`);
    const dr=document.getElementById(`hr${idx}-${col}`);
    if(da)da.classList.add('lit');if(db)db.classList.add('lit');
    sndPop(600);await sl(1200);

    if(isAdd){
      let sum=aArr[col]+bArr[col]+carry;
      const prevCarry=carry;
      if(sum>=10&&col>0){
        carry=1;
        document.getElementById(`xm${idx}`).textContent=`${aArr[col]} + ${bArr[col]}${prevCarry>0?' + 1':''} = ${sum}`;
        sndPop(700);await sl(1500);
        document.getElementById(`xm${idx}`).textContent=`${sum%10} を かいて…`;
        if(dr)dr.textContent=sum%10;if(dr)dr.classList.add('lit');if(dr)dr.classList.add('green');
        sndPop(800);await sl(1200);
        document.getElementById(`xm${idx}`).textContent='1 くりあげ！';document.getElementById(`xm${idx}`).className='anim-msg red';
        document.getElementById(`hc${idx}-${col}`).textContent='1';document.getElementById(`hc${idx}-${col}`).classList.add('show');
        sndPop(900);await sl(1500);
        document.getElementById(`xm${idx}`).className='anim-msg blue';
      }else{
        document.getElementById(`xm${idx}`).textContent=`${aArr[col]} + ${bArr[col]}${prevCarry>0?' + 1':''} = ${sum}`;
        if(dr)dr.textContent=sum;if(dr)dr.classList.add('lit');if(dr)dr.classList.add('green');
        carry=0;
        sndPop(800);await sl(1500);
      }
    }else{
      let top=aArr[col]-carry;
      let diff=top-bArr[col];
      const prevCarry=carry;
      if(diff<0&&col>0){
        document.getElementById(`xm${idx}`).textContent=`${top} − ${bArr[col]} → たりない！`;document.getElementById(`xm${idx}`).className='anim-msg red';
        sndPop(400);await sl(1500);
        document.getElementById(`xm${idx}`).textContent='くりさげて 10 もらうよ';
        document.getElementById(`hc${idx}-${col}`).textContent='⁻¹';document.getElementById(`hc${idx}-${col}`).classList.add('show');
        sndPop(600);await sl(1500);
        diff=top+10-bArr[col];carry=1;
        document.getElementById(`xm${idx}`).textContent=`${top+10} − ${bArr[col]} = ${diff}`;document.getElementById(`xm${idx}`).className='anim-msg blue';
        if(dr)dr.textContent=diff;if(dr)dr.classList.add('lit');if(dr)dr.classList.add('green');
        sndPop(800);await sl(1500);
      }else{
        carry=diff<0?1:0;diff=Math.max(0,diff);
        document.getElementById(`xm${idx}`).textContent=`${top} − ${bArr[col]} = ${diff}`;
        if(dr)dr.textContent=diff;if(dr)dr.classList.add('lit');if(dr)dr.classList.add('green');
        sndPop(800);await sl(1500);
      }
    }
  }
  await sl(800);sndOk();
  document.getElementById(`xm${idx}`).textContent=`${a} ${isAdd?'+':'−'} ${b} = ${ans}！`;document.getElementById(`xm${idx}`).className='anim-msg green';
  document.getElementById(`xr${idx}`).textContent=`こたえは ${ans}`;document.getElementById(`xr${idx}`).classList.add('show');
  btn.disabled=false;btn.textContent='🎬 もういちど みる';
}

// TIME: 5分刻みでカウント
async function animTime(el,q,btn,idx){
  el.innerHTML=`<div class="anim-stage"><div class="anim-msg blue" id="xm${idx}">${q.startLabel} から ${q.addMin}ふん すすめるよ</div><div style="text-align:center" id="xclk${idx}">${drawClockSVG(q.hA1,q.mA1,160)}</div><div style="text-align:center;font-size:.7rem;color:var(--text-soft);margin:6px 0">🔴 みじかいはり 🔵 ながいはり</div><div style="text-align:center;font-size:1.1rem;font-weight:900;color:var(--orange);min-height:26px" id="xtc${idx}"></div><div class="anim-result" id="xr${idx}"></div></div>`;
  await sl(1000);
  document.getElementById(`xm${idx}`).textContent='🔴🔵 5ふんずつ すすめるよ！';document.getElementById(`xm${idx}`).className='anim-msg orange';
  await sl(600);
  // Move 5 min at a time
  const steps=q.addMin/5;const clk=document.getElementById(`xclk${idx}`);const tc=document.getElementById(`xtc${idx}`);
  for(let s=1;s<=steps;s++){
    const elapsed=s*5;
    const curMin=q.totalMinStart+elapsed;
    const mA=(curMin%60)*6;const hA=curMin*0.5;
    clk.innerHTML=drawClockSVG(hA,mA,160);
    tc.textContent=`+${elapsed}ふん`;
    sndTick();
    await sl(400);
  }
  clk.innerHTML=drawClockSVG(q.hA2,q.mA2,160);
  await sl(400);sndOk();
  document.getElementById(`xm${idx}`).textContent=`${q.answer}！`;document.getElementById(`xm${idx}`).className='anim-msg green';
  tc.textContent='';
  document.getElementById(`xr${idx}`).textContent=`${q.startLabel}の ${q.addMin}ふんご → ${q.answer}`;document.getElementById(`xr${idx}`).classList.add('show');
  btn.disabled=false;btn.textContent='🎬 もういちど みる';
}

// UNIT: step by step (no division)
async function animUnit(el,q,btn,idx){
  const explain=q.explain||`${q.qText} → ${q.answer}`;
  const steps=explain.split('だから、');
  let stepsHtml=steps.map((s,i)=>`<div id="us${idx}-${i}" style="font-size:1.1rem;font-weight:700;margin:10px 0;opacity:0;transition:all .4s;color:#b45309">${s.trim()}</div>`).join('');
  el.innerHTML=`<div class="anim-stage"><div class="anim-msg blue" id="xm${idx}">たんいを かえてみよう！</div>${stepsHtml}<div class="anim-result" id="xr${idx}"></div></div>`;
  await sl(800);
  for(let i=0;i<steps.length;i++){document.getElementById(`us${idx}-${i}`).style.opacity='1';sndPop(600+i*80);await sl(1000)}
  await sl(400);sndOk();
  document.getElementById(`xm${idx}`).textContent=`こたえは ${q.answer}！`;document.getElementById(`xm${idx}`).className='anim-msg green';
  document.getElementById(`xr${idx}`).textContent=`${q.answer}`;document.getElementById(`xr${idx}`).classList.add('show');
  btn.disabled=false;btn.textContent='🎬 もういちど みる';
}

// SHAPES: SVG + features
async function animShape(el,q,btn,idx){
  const props={
    square:{name:'正方形',svg:shapeSVG('square',180,150),features:['4つの へんが ぜんぶ おなじ ながさ','4つの かどが ぜんぶ 直角（90°）']},
    rect:{name:'長方形',svg:shapeSVG('rect',180,150),features:['むかいあう へんが おなじ ながさ','4つの かどが ぜんぶ 直角（90°）']},
    triangle:{name:'三角形',svg:shapeSVG('triangle',180,150),features:['3つの へんで できている','3つの かどが ある']},
  };const p=props[q.shape]||props.square;
  let featHtml=p.features.map((f,i)=>`<div id="sf${idx}-${i}" style="font-size:.9rem;font-weight:700;margin:6px 0;opacity:0;transition:all .4s;color:#b45309">✅ ${f}</div>`).join('');
  el.innerHTML=`<div class="anim-stage"><div class="anim-msg blue" id="xm${idx}">この 図形を みてみよう！</div>${p.svg}${featHtml}<div class="anim-result" id="xr${idx}"></div></div>`;
  await sl(1000);
  document.getElementById(`xm${idx}`).textContent=`これは「${p.name}」！`;document.getElementById(`xm${idx}`).className='anim-msg green';
  await sl(600);
  for(let i=0;i<p.features.length;i++){document.getElementById(`sf${idx}-${i}`).style.opacity='1';sndPop(600+i*80);await sl(800)}
  await sl(400);sndOk();
  document.getElementById(`xr${idx}`).textContent=`${p.name} の とくちょう をおぼえよう！`;document.getElementById(`xr${idx}`).classList.add('show');
  btn.disabled=false;btn.textContent='🎬 もういちど みる';
}

function startRetry(){sndClick();phase='retry';retryQs=generateQs(TOTAL,unitType);retryResults=[];questionLog=[];currentQ=0;document.getElementById('resultScreen').classList.add('hidden');document.getElementById('quizScreen').classList.remove('hidden');renderQ()}
function showConfetti(){const c=document.getElementById('confettiContainer');const es=['🎉','⭐','🌟','✨','🎊','💫','🌈','🎈'];for(let i=0;i<40;i++){const el=document.createElement('span');el.className='confetti';el.textContent=es[Math.floor(Math.random()*es.length)];el.style.left=Math.random()*100+'%';el.style.animationDuration=(1.5+Math.random()*2)+'s';el.style.animationDelay=(Math.random()*.8)+'s';el.style.fontSize=(1+Math.random()*1.5)+'rem';c.appendChild(el)}setTimeout(()=>{c.innerHTML=''},4000)}
</script>
