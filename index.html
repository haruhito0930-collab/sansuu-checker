<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>算数・数学 つまずきチェッカー</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root{--pink:#ff6b9d;--blue:#4ea8de;--green:#51cf66;--purple:#cc5de8;--orange:#ff922b;--bg:#fef7ff;--card:#fff;--text:#2d3436;--text-soft:#636e72;--shadow:0 4px 20px rgba(0,0,0,.06);--radius:20px}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Zen Maru Gothic','Hiragino Kaku Gothic ProN',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:16px}
  .container{max-width:560px;margin:0 auto}
  .header{text-align:center;padding:0;margin-bottom:14px;background:linear-gradient(135deg,#ff6b9d,#cc5de8);border-radius:var(--radius);overflow:hidden}
  .header-inner{padding:24px 16px 20px}
  .header-icon{font-size:2.5rem}
  .header h1{font-size:1.5rem;font-weight:900;color:#fff;margin-top:6px}
  .header p{color:rgba(255,255,255,.85);font-size:.9rem;margin-top:4px;font-weight:700}
  .card{background:var(--card);border-radius:var(--radius);padding:20px 16px;margin-bottom:14px;box-shadow:var(--shadow)}
  .grade-grid{display:flex;flex-direction:column;gap:10px}
  .grade-item{display:flex;align-items:center;gap:14px;padding:16px;border:2.5px solid #e0e0e0;border-radius:16px;cursor:pointer;transition:all .15s;background:#fff;text-decoration:none;color:var(--text)}
  .grade-item:active{transform:scale(.97)}
  .grade-icon{font-size:2.2rem;flex-shrink:0;width:48px;height:48px;display:flex;align-items:center;justify-content:center;border-radius:14px}
  .grade-label{font-size:1.05rem;font-weight:900}.grade-desc{font-size:.8rem;color:var(--text-soft);margin-top:2px}
  .grade-item.kindergarten{border-color:#f9a8d4}.grade-item.kindergarten .grade-icon{background:#fce7f3}
  .grade-item.g1{border-color:#93c5fd}.grade-item.g1 .grade-icon{background:#dbeafe}
  .grade-item.g2{border-color:#86efac}.grade-item.g2 .grade-icon{background:#d1fae5}
  .grade-item.coming{border-color:#e0e0e0;opacity:.5;cursor:default}.grade-item.coming .grade-icon{background:#f1f5f9}
  @media(hover:hover){
    .grade-item.kindergarten:hover{background:#fdf2f8;border-color:#f472b6;transform:scale(1.02)}
    .grade-item.g1:hover{background:#eff6ff;border-color:#60a5fa;transform:scale(1.02)}
    .grade-item.g2:hover{background:#f0fdf4;border-color:#4ade80;transform:scale(1.02)}
  }
  .badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:.7rem;font-weight:700;margin-left:8px}
  .badge-new{background:#dcfce7;color:#166534}
  .badge-coming{background:#f1f5f9;color:#94a3b8}
  .philosophy{text-align:center;padding:16px;color:var(--text-soft);font-size:.85rem;line-height:1.7}.philosophy strong{color:var(--pink)}
  .footer{text-align:center;color:var(--text-soft);font-size:.75rem;padding:8px 0}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-inner">
      <div class="header-icon">📚</div>
      <h1>算数・数学 つまずきチェッカー</h1>
      <p>がくねんを えらんでね！</p>
    </div>
  </div>

  <div class="card">
    <div class="grade-grid">
      <a class="grade-item kindergarten" href="kindergarten.html">
        <div class="grade-icon">🎒</div>
        <div>
          <div class="grade-label">ようちえん <span class="badge badge-new">✨ NEW</span></div>
          <div class="grade-desc">かず・かたち・なかまわけ・じゅんばん</div>
        </div>
      </a>
      <a class="grade-item g1" href="grade1.html">
        <div class="grade-icon">📐</div>
        <div>
          <div class="grade-label">小学1年生 <span class="badge badge-new">✨ NEW</span></div>
          <div class="grade-desc">たしざん・ひきざん・とけい・ながさ</div>
        </div>
      </a>
      <a class="grade-item g2" href="grade2.html">
        <div class="grade-icon">✖️</div>
        <div>
          <div class="grade-label">小学2年生 <span class="badge badge-new">✨ NEW</span></div>
          <div class="grade-desc">九九・ひっさん・じこくとじかん・たんい</div>
        </div>
      </a>
      <div class="grade-item coming">
        <div class="grade-icon">📊</div>
        <div>
          <div class="grade-label">小学3年生 <span class="badge badge-coming">準備中</span></div>
          <div class="grade-desc">わり算・小数・分数・重さ</div>
        </div>
      </div>
      <div class="grade-item coming">
        <div class="grade-icon">📏</div>
        <div>
          <div class="grade-label">小学4年生〜 <span class="badge badge-coming">準備中</span></div>
          <div class="grade-desc">順次追加予定</div>
        </div>
      </div>
    </div>
  </div>

  <div class="philosophy">
    算数・数学にセンスやひらめきは必要ありません。<br>
    正しいやり方を積み重ねれば、どのお子さんでも必ず伸びます。<br>
    <strong>大切なのは、勉強のやり方だけ。</strong>
  </div>

  <div class="footer">算数・数学 つまずきチェッカー</div>
</div>
</body>
</html>
