<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>算数・数学 つまずきチェッカー</title>
  <style>
    :root {
      --primary: #4f46e5;
      --primary-dark: #3730a3;
      --primary-light: #818cf8;
      --primary-bg: #eef2ff;
      --secondary: #06b6d4;
      --success: #10b981;
      --success-bg: #d1fae5;
      --warning: #f59e0b;
      --danger: #ef4444;
      --bg: #f1f5f9;
      --card-bg: #ffffff;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --radius: 14px;
      --radius-sm: 8px;
      --shadow: 0 1px 3px rgba(0,0,0,0.07), 0 4px 16px rgba(0,0,0,0.04);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 16px;
    }

    .container { max-width: 820px; margin: 0 auto; }

    /* Header */
    header {
      text-align: center;
      padding: 36px 24px 28px;
    }
    header .icon { font-size: 3rem; margin-bottom: 10px; }
    header h1 {
      font-size: 1.9rem;
      font-weight: 800;
      color: var(--primary);
      letter-spacing: -0.02em;
    }
    header p { color: var(--text-muted); margin-top: 6px; font-size: 1rem; }

    /* Card */
    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 24px;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
    }

    .step-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--primary);
      margin-bottom: 6px;
    }

    .card-title {
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 14px;
      color: var(--text);
    }

    /* API Key */
    .api-key-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .api-key-row input {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 0.88rem;
      font-family: 'Courier New', monospace;
      background: #f8fafc;
      color: var(--text);
      transition: border-color 0.15s;
    }
    .api-key-row input:focus {
      outline: none;
      border-color: var(--primary-light);
      background: white;
    }
    .api-key-row input::placeholder { color: #a0aec0; }
    .api-key-hint {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 8px;
    }
    .api-key-status {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.78rem;
      margin-top: 6px;
      padding: 3px 10px;
      border-radius: 100px;
    }
    .api-key-status.ok { background: var(--success-bg); color: #065f46; }

    /* Select */
    .select-wrapper {
      position: relative;
    }
    .select-wrapper::after {
      content: '▾';
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
      font-size: 0.9rem;
    }
    select {
      width: 100%;
      padding: 12px 40px 12px 16px;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 1rem;
      font-family: inherit;
      background: white;
      cursor: pointer;
      appearance: none;
      color: var(--text);
      transition: border-color 0.15s;
    }
    select:focus { outline: none; border-color: var(--primary); }

    /* Subject Badge */
    .subject-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 14px;
      border-radius: 100px;
      font-size: 0.82rem;
      font-weight: 700;
      margin-top: 10px;
    }
    .badge-sansuu { background: #fef3c7; color: #92400e; }
    .badge-suugaku { background: #dbeafe; color: #1e40af; }
    .badge-prep { background: #fce7f3; color: #9d174d; }

    /* Checkbox Grid */
    .checkbox-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 8px;
    }
    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
      font-size: 0.9rem;
    }
    .checkbox-item:hover { border-color: var(--primary-light); background: var(--primary-bg); }
    .checkbox-item.checked {
      border-color: var(--primary);
      background: var(--primary-bg);
      color: var(--primary-dark);
      font-weight: 600;
    }
    .checkbox-item input[type="checkbox"] {
      width: 17px;
      height: 17px;
      accent-color: var(--primary);
      flex-shrink: 0;
    }

    /* Generate Button */
    .generate-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 8px 0 4px;
    }
    .selected-count {
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    .selected-count strong { color: var(--primary); }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 12px 24px;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 0.95rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s;
      text-decoration: none;
    }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none !important; }
    .btn-primary {
      background: var(--primary);
      color: white;
      box-shadow: 0 2px 8px rgba(79,70,229,0.3);
    }
    .btn-primary:hover:not(:disabled) { background: var(--primary-dark); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(79,70,229,0.35); }
    .btn-secondary {
      background: white;
      color: var(--primary);
      border: 2px solid var(--primary);
    }
    .btn-secondary:hover:not(:disabled) { background: var(--primary-bg); }
    .btn-success {
      background: var(--success);
      color: white;
      font-size: 0.85rem;
      padding: 8px 16px;
    }
    .btn-success:hover:not(:disabled) { background: #059669; }
    .btn-outline {
      background: white;
      color: var(--primary);
      border: 1.5px solid var(--primary-light);
      font-size: 0.85rem;
      padding: 8px 16px;
    }
    .btn-outline:hover:not(:disabled) { background: var(--primary-bg); }
    .btn-sm { font-size: 0.8rem; padding: 7px 14px; }
    .btn-lg { font-size: 1.05rem; padding: 14px 32px; }

    /* Result Cards */
    .result-card {
      background: white;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      margin-bottom: 20px;
      overflow: hidden;
    }
    .result-card-header {
      padding: 16px 20px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
    }
    .result-card-header h3 {
      font-size: 1rem;
      font-weight: 700;
      margin: 0;
    }
    .result-card-header .grade-tag {
      font-size: 0.75rem;
      opacity: 0.85;
      margin-top: 2px;
    }
    .result-card-body { padding: 20px; }

    .problems-list { display: flex; flex-direction: column; gap: 14px; }

    .problem-item {
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
    }
    .problem-question {
      padding: 14px 16px;
      background: #fafafa;
      font-size: 0.95rem;
      line-height: 1.6;
    }
    .problem-number {
      display: inline-block;
      background: var(--primary);
      color: white;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 100px;
      margin-right: 6px;
      vertical-align: middle;
    }
    .problem-answer {
      padding: 14px 16px;
      background: var(--success-bg);
      border-top: 1.5px solid #a7f3d0;
      font-size: 0.92rem;
      line-height: 1.65;
      display: none;
      white-space: pre-wrap;
    }
    .problem-answer.visible { display: block; }
    .answer-label {
      font-size: 0.72rem;
      font-weight: 700;
      color: #065f46;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }

    .card-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }

    /* Loading */
    .loading-spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    .loading-spinner.dark {
      border-color: rgba(79,70,229,0.25);
      border-top-color: var(--primary);
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .skeleton {
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
      border-radius: 6px;
      height: 16px;
      margin: 6px 0;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }

    /* Error */
    .error-box {
      padding: 12px 16px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: var(--radius-sm);
      color: #991b1b;
      font-size: 0.88rem;
      margin-top: 12px;
    }

    /* Divider */
    .divider {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.8rem;
      margin: 4px 0 16px;
      position: relative;
    }
    .divider::before {
      content: '';
      position: absolute;
      left: 0; right: 0; top: 50%;
      height: 1px;
      background: var(--border);
    }
    .divider span {
      position: relative;
      background: white;
      padding: 0 12px;
    }

    /* Additional problems */
    .more-problems { margin-top: 12px; }

    /* Footer */
    footer {
      text-align: center;
      padding: 24px;
      color: var(--text-muted);
      font-size: 0.78rem;
    }

    @media (max-width: 600px) {
      header h1 { font-size: 1.5rem; }
      .checkbox-grid { grid-template-columns: 1fr 1fr; }
      .card { padding: 18px; }
    }
  </style>
</head>
<body>
<div class="container">

  <header>
    <div class="icon">📐</div>
    <h1>算数・数学 つまずきチェッカー</h1>
    <p>苦手な場面を選ぶと、ぴったりの練習問題をAIが作ります</p>
  </header>

  <!-- API Key -->
  <div class="card">
    <div class="step-label">設定</div>
    <div class="card-title">Anthropic APIキー</div>
    <div class="api-key-row">
      <input type="password" id="apiKeyInput" placeholder="sk-ant-api03-..." autocomplete="off" oninput="onApiKeyInput()">
      <button class="btn btn-secondary btn-sm" id="toggleKeyBtn" onclick="toggleKeyVisibility()">表示</button>
    </div>
    <div id="apiKeyStatus" class="api-key-hint">
      環境変数 <code>ANTHROPIC_API_KEY</code> が設定されていれば自動入力されます。<br>
      ブラウザで直接開く場合は手動で入力してください。
    </div>
  </div>

  <!-- Step 1: Grade -->
  <div class="card">
    <div class="step-label">ステップ 1</div>
    <div class="card-title">学年を選んでください</div>
    <div class="select-wrapper">
      <select id="gradeSelect" onchange="onGradeChange()">
        <option value="">-- 学年を選択してください --</option>
        <option value="幼稚園">幼稚園</option>
        <optgroup label="小学生（算数）">
          <option value="小学1年">小学1年生</option>
          <option value="小学2年">小学2年生</option>
          <option value="小学3年">小学3年生</option>
          <option value="小学4年">小学4年生</option>
          <option value="小学5年">小学5年生</option>
          <option value="小学6年">小学6年生</option>
        </optgroup>
        <optgroup label="中学生（数学）">
          <option value="中学1年">中学1年生</option>
          <option value="中学2年">中学2年生</option>
          <option value="中学3年">中学3年生</option>
        </optgroup>
      </select>
    </div>
    <div id="subjectBadge"></div>
  </div>

  <!-- Step 2: Weaknesses -->
  <div class="card" id="weaknessCard" style="display:none">
    <div class="step-label">ステップ 2</div>
    <div class="card-title">苦手な場面を選んでください（複数選択可）</div>
    <div class="checkbox-grid" id="checkboxGrid"></div>
  </div>

  <!-- Generate Button -->
  <div id="generateSection" style="display:none;">
    <div class="generate-section">
      <div class="selected-count" id="selectedCount"></div>
      <button class="btn btn-primary btn-lg" id="generateBtn" onclick="generateAllProblems()">
        ✨ 練習問題を生成する
      </button>
    </div>
  </div>

  <!-- Results -->
  <div id="resultsSection" style="margin-top: 20px;"></div>

  <footer>
    Powered by Claude (Anthropic API) &nbsp;|&nbsp; 算数・数学 つまずきチェッカー
  </footer>
</div>

<script>
// ================================================================
// Data: Grade → weaknesses mapping
// ================================================================
const GRADE_DATA = {
  '幼稚園': {
    subject: '算数準備',
    badge: 'prep',
    label: '幼稚園',
    weaknesses: [
      '1〜10の数を数える',
      '数の大きさくらべ（どちらが多い）',
      '形の認識（丸・三角・四角）',
      '仲間分け・分類する',
      '順番（1番・2番…）',
    ]
  },
  '小学1年': {
    subject: '算数',
    badge: 'sansuu',
    label: '小学1年生',
    weaknesses: [
      'たし算の基本（繰り上がりなし）',
      'ひき算の基本（繰り下がりなし）',
      '繰り上がりのあるたし算（例：8+5）',
      '繰り下がりのあるひき算（例：13−7）',
      '数の順序・大小比べ',
      '時計の読み方（〇時・〇時半）',
      '長さ・かさ・重さの感覚',
    ]
  },
  '小学2年': {
    subject: '算数',
    badge: 'sansuu',
    label: '小学2年生',
    weaknesses: [
      'かけ算（九九）の習得',
      '2・3桁のたし算の筆算',
      '2・3桁のひき算の筆算',
      '時刻と時間（〇分後・〇分前）',
      '長さの単位（mm・cm・m）',
      'かさの単位（mL・dL・L）',
      '正方形・長方形・三角形',
    ]
  },
  '小学3年': {
    subject: '算数',
    badge: 'sansuu',
    label: '小学3年生',
    weaknesses: [
      'わり算の基本',
      'あまりのあるわり算',
      '大きな数（万の位まで）',
      '小数の基本（0.1の位）',
      '分数の基本（同分母）',
      '重さの単位（g・kg・t）',
      '時間の計算',
      '表とグラフ',
    ]
  },
  '小学4年': {
    subject: '算数',
    badge: 'sansuu',
    label: '小学4年生',
    weaknesses: [
      '大きな数（億・兆）',
      '小数のたし算・ひき算',
      '分数のたし算・ひき算（同分母）',
      '面積（長方形・正方形）',
      '角の大きさ・三角定規',
      '2桁÷1桁の筆算',
      '3桁÷2桁の筆算',
      '概数と四捨五入',
    ]
  },
  '小学5年': {
    subject: '算数',
    badge: 'sansuu',
    label: '小学5年生',
    weaknesses: [
      '小数のかけ算',
      '小数のわり算',
      '分数のたし算・ひき算（異分母）',
      '割合・百分率（%）',
      '単位量あたりの大きさ',
      '面積（三角形・平行四辺形・台形）',
      '体積（直方体・立方体）',
      '正多角形・円周',
    ]
  },
  '小学6年': {
    subject: '算数',
    badge: 'sansuu',
    label: '小学6年生',
    weaknesses: [
      '分数×分数・分数÷分数',
      '比と比の値',
      '速さ・時間・距離の関係',
      '文字を使った式（□や△）',
      '拡大図・縮小図・縮尺',
      '対称な図形',
      'データの調べ方（平均・代表値）',
      '場合の数・順列',
    ]
  },
  '中学1年': {
    subject: '数学',
    badge: 'suugaku',
    label: '中学1年生',
    weaknesses: [
      '正負の数の計算（四則）',
      '文字式の基本・式の値',
      '一次方程式を解く',
      '比例・反比例のグラフ',
      '平面図形（作図・おうぎ形）',
      '空間図形（体積・表面積）',
      '度数分布表・ヒストグラム',
    ]
  },
  '中学2年': {
    subject: '数学',
    badge: 'suugaku',
    label: '中学2年生',
    weaknesses: [
      '連立方程式を解く',
      '一次関数の式とグラフ',
      '一次関数の応用問題',
      '多項式の計算（展開）',
      '単項式×多項式・多項式÷単項式',
      '三角形の合同条件・証明',
      '平行四辺形の性質・証明',
      '確率の基本',
    ]
  },
  '中学3年': {
    subject: '数学',
    badge: 'suugaku',
    label: '中学3年生',
    weaknesses: [
      '式の展開と因数分解',
      '平方根の計算',
      '二次方程式を解く（解の公式）',
      '二次関数のグラフと変化',
      '相似な図形・相似比',
      '三平方の定理の応用',
      '円の性質（円周角・弧）',
      '標本調査',
    ]
  },
};

// ================================================================
// State
// ================================================================
let currentGrade = '';
let selectedWeaknesses = new Set();
let answersVisible = {}; // key: cardId, value: bool

// ================================================================
// Init: try to read API key from window variable (server-injected)
// ================================================================
(function init() {
  if (typeof window.ANTHROPIC_API_KEY === 'string' && window.ANTHROPIC_API_KEY.startsWith('sk-')) {
    document.getElementById('apiKeyInput').value = window.ANTHROPIC_API_KEY;
    showApiKeyOk();
  }
})();

function onApiKeyInput() {
  const val = document.getElementById('apiKeyInput').value.trim();
  if (val.startsWith('sk-')) {
    showApiKeyOk();
  } else {
    document.getElementById('apiKeyStatus').innerHTML =
      '環境変数 <code>ANTHROPIC_API_KEY</code> が設定されていれば自動入力されます。<br>ブラウザで直接開く場合は手動で入力してください。';
    document.getElementById('apiKeyStatus').className = 'api-key-hint';
  }
}

function showApiKeyOk() {
  document.getElementById('apiKeyStatus').innerHTML =
    '<span class="api-key-status ok">✓ APIキーが設定されています</span>';
}

function toggleKeyVisibility() {
  const input = document.getElementById('apiKeyInput');
  const btn = document.getElementById('toggleKeyBtn');
  if (input.type === 'password') {
    input.type = 'text';
    btn.textContent = '隠す';
  } else {
    input.type = 'password';
    btn.textContent = '表示';
  }
}

// ================================================================
// Grade selection
// ================================================================
function onGradeChange() {
  const select = document.getElementById('gradeSelect');
  currentGrade = select.value;
  selectedWeaknesses.clear();

  // Reset results
  document.getElementById('resultsSection').innerHTML = '';

  if (!currentGrade) {
    document.getElementById('subjectBadge').innerHTML = '';
    document.getElementById('weaknessCard').style.display = 'none';
    document.getElementById('generateSection').style.display = 'none';
    return;
  }

  const data = GRADE_DATA[currentGrade];

  // Badge
  const badgeClass = { sansuu: 'badge-sansuu', suugaku: 'badge-suugaku', prep: 'badge-prep' }[data.badge];
  const badgeIcon = { sansuu: '📐', suugaku: '📊', prep: '🎒' }[data.badge];
  document.getElementById('subjectBadge').innerHTML =
    `<span class="subject-badge ${badgeClass}">${badgeIcon} ${data.subject}</span>`;

  // Checkboxes
  const grid = document.getElementById('checkboxGrid');
  grid.innerHTML = data.weaknesses.map((w, i) => `
    <label class="checkbox-item" id="cb-label-${i}" onclick="toggleWeakness('${escHtml(w)}', ${i})">
      <input type="checkbox" id="cb-${i}" value="${escHtml(w)}" onclick="event.stopPropagation(); toggleWeakness('${escHtml(w)}', ${i})">
      <span>${escHtml(w)}</span>
    </label>
  `).join('');

  document.getElementById('weaknessCard').style.display = 'block';
  document.getElementById('generateSection').style.display = 'none';
  updateSelectedCount();
}

function toggleWeakness(weakness, idx) {
  if (selectedWeaknesses.has(weakness)) {
    selectedWeaknesses.delete(weakness);
    document.getElementById(`cb-${idx}`).checked = false;
    document.getElementById(`cb-label-${idx}`).classList.remove('checked');
  } else {
    selectedWeaknesses.add(weakness);
    document.getElementById(`cb-${idx}`).checked = true;
    document.getElementById(`cb-label-${idx}`).classList.add('checked');
  }
  updateSelectedCount();
}

function updateSelectedCount() {
  const n = selectedWeaknesses.size;
  const section = document.getElementById('generateSection');
  const countEl = document.getElementById('selectedCount');
  const btn = document.getElementById('generateBtn');

  if (n > 0) {
    section.style.display = 'block';
    countEl.innerHTML = `<strong>${n}</strong> 個の苦手場面を選択中 → <strong>${n * 2}</strong> 問生成されます`;
    btn.disabled = false;
  } else {
    section.style.display = 'none';
  }
}

// ================================================================
// Problem Generation
// ================================================================
function getApiKey() {
  return document.getElementById('apiKeyInput').value.trim();
}

async function callClaude(prompt) {
  const apiKey = getApiKey();
  if (!apiKey) throw new Error('APIキーを入力してください。');

  let res;
  try {
    res = await fetch('https://anthropic-proxy.sansuu-api.workers.dev/v1/messages', {
      method: 'POST',
      mode: 'cors',
      headers: {
        'x-api-key': apiKey,
        'content-type': 'application/json',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1024,
        messages: [{ role: 'user', content: prompt }],
      }),
    });
  } catch (networkErr) {
    // fetch() itself threw — network error or CORS preflight failure
    throw new Error(
      'ネットワークエラーが発生しました。\n' +
      '① APIキーが正しく入力されているか確認してください。\n' +
      '② ブラウザの開発者ツール（F12）→ Console でエラー詳細を確認してください。\n' +
      '③ 広告ブロッカー等の拡張機能がAPIリクエストをブロックしていないか確認してください。\n' +
      `(原因: ${networkErr.message})`
    );
  }

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    const msg = err.error?.message || `HTTPエラー (${res.status})`;
    if (res.status === 401) throw new Error('APIキーが無効です。正しいキーを入力してください。');
    if (res.status === 429) throw new Error('APIの利用制限に達しました。しばらく待ってから再試行してください。');
    throw new Error(msg);
  }

  const data = await res.json();
  return data.content[0].text;
}

function buildPrompt(grade, subject, weakness, count = 2, existingQ = []) {
  const gradeLabel = GRADE_DATA[grade].label;
  const existingNote = existingQ.length > 0
    ? `\n\n既に出題した問題（重複しないようにしてください）:\n${existingQ.map((q, i) => `${i+1}. ${q}`).join('\n')}`
    : '';

  return `あなたは${gradeLabel}向けの${subject}の先生です。
「${weakness}」が苦手な子どものために、練習問題を${count}問作ってください。${existingNote}

以下のJSON形式のみで返答してください（他の文章・説明は不要）:
{
  "problems": [
    {
      "question": "問題文（${gradeLabel}にわかりやすい表現で）",
      "answer": "答えと丁寧な解説"
    }
  ]
}

条件:
- ${gradeLabel}の学習レベルに合った難易度にする
- 問題文は子どもが理解できる言葉で書く
- 答えには計算の途中式や考え方の解説を含める
- JSONのみ返す`;
}

function parseProblems(text) {
  try {
    const match = text.match(/\{[\s\S]*\}/);
    if (!match) throw new Error('JSON not found');
    const data = JSON.parse(match[0]);
    if (!Array.isArray(data.problems)) throw new Error('problems array missing');
    return data.problems;
  } catch (e) {
    throw new Error('AIの回答を解析できませんでした。もう一度お試しください。');
  }
}

// ================================================================
// Render
// ================================================================
function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function cardId(weakness) {
  return 'card-' + weakness.replace(/[^a-zA-Z0-9]/g, '_');
}

async function generateAllProblems() {
  const apiKey = getApiKey();
  if (!apiKey) {
    alert('APIキーを入力してください。');
    return;
  }

  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="loading-spinner"></span> 生成中...';

  const resultsSection = document.getElementById('resultsSection');
  resultsSection.innerHTML = '';
  answersVisible = {};

  const data = GRADE_DATA[currentGrade];
  const weaknesses = [...selectedWeaknesses];

  // Create placeholder cards
  weaknesses.forEach(w => {
    const id = cardId(w);
    resultsSection.insertAdjacentHTML('beforeend', createLoadingCard(id, w, data));
  });

  // Generate in parallel
  const results = await Promise.allSettled(
    weaknesses.map(w => generateProblemsForWeakness(w, data, cardId(w)))
  );

  btn.disabled = false;
  btn.innerHTML = '✨ もう一度生成する';

  results.forEach((r, i) => {
    if (r.status === 'rejected') {
      const id = cardId(weaknesses[i]);
      const el = document.getElementById(`${id}-body`);
      if (el) el.innerHTML = `<div class="error-box">エラー: ${escHtml(r.reason.message)}</div>`;
    }
  });
}

async function generateProblemsForWeakness(weakness, data, id, existingProblems = []) {
  const prompt = buildPrompt(currentGrade, data.subject, weakness, 2, existingProblems.map(p => p.question));
  const text = await callClaude(prompt);
  const problems = parseProblems(text);

  const bodyEl = document.getElementById(`${id}-body`);
  if (!bodyEl) return;

  const startIdx = existingProblems.length;

  if (startIdx === 0) {
    // First generation: replace skeleton
    bodyEl.innerHTML = renderProblemsHtml(id, problems, 0);
    bodyEl.insertAdjacentHTML('beforeend', renderCardActions(id, weakness, data));
  } else {
    // Additional problems: append before actions
    const actionsEl = document.getElementById(`${id}-actions`);
    const newHtml = renderMoreProblems(id, problems, startIdx);
    if (actionsEl) {
      actionsEl.insertAdjacentHTML('beforebegin', `<div class="more-problems">${newHtml}</div>`);
    }
  }

  // Store state for "add more"
  const card = document.getElementById(id);
  if (card) {
    const existing = JSON.parse(card.dataset.problems || '[]');
    card.dataset.problems = JSON.stringify([...existing, ...problems]);
  }

  return problems;
}

function createLoadingCard(id, weakness, data) {
  return `
  <div class="result-card" id="${id}">
    <div class="result-card-header">
      <div class="grade-tag">${data.label} / ${data.subject}</div>
      <h3>${escHtml(weakness)}</h3>
    </div>
    <div class="result-card-body" id="${id}-body">
      <div class="skeleton" style="width:80%"></div>
      <div class="skeleton" style="width:60%; margin-top:8px"></div>
      <div class="skeleton" style="width:70%; margin-top:24px"></div>
      <div class="skeleton" style="width:55%; margin-top:8px"></div>
    </div>
  </div>`;
}

function renderProblemsHtml(id, problems, startIdx) {
  return `<div class="problems-list" id="${id}-list">
    ${problems.map((p, i) => renderProblemItem(id, p, startIdx + i)).join('')}
  </div>`;
}

function renderMoreProblems(id, problems, startIdx) {
  return `<div class="divider"><span>追加問題</span></div>
  <div class="problems-list">
    ${problems.map((p, i) => renderProblemItem(id, p, startIdx + i)).join('')}
  </div>`;
}

function renderProblemItem(id, problem, idx) {
  const ansId = `${id}-ans-${idx}`;
  return `
  <div class="problem-item">
    <div class="problem-question">
      <span class="problem-number">問 ${idx + 1}</span>
      ${escHtml(problem.question)}
    </div>
    <div class="problem-answer" id="${ansId}">
      <div class="answer-label">解答・解説</div>
      ${escHtml(problem.answer)}
    </div>
  </div>`;
}

function renderCardActions(id, weakness, data) {
  return `
  <div class="card-actions" id="${id}-actions">
    <button class="btn btn-success" id="${id}-toggle-btn" onclick="toggleAllAnswers('${id}')">
      ✓ 解答を見る
    </button>
    <button class="btn btn-outline" id="${id}-more-btn" onclick="addMoreProblems('${id}', '${escHtml(weakness)}')">
      ＋ さらに2問追加
    </button>
  </div>`;
}

// ================================================================
// Answer toggle
// ================================================================
function toggleAllAnswers(id) {
  const card = document.getElementById(id);
  const btn = document.getElementById(`${id}-toggle-btn`);
  const answers = card.querySelectorAll('.problem-answer');

  const allVisible = [...answers].every(a => a.classList.contains('visible'));

  answers.forEach(a => a.classList.toggle('visible', !allVisible));
  btn.textContent = allVisible ? '✓ 解答を見る' : '✗ 解答を隠す';
}

// ================================================================
// Add more problems
// ================================================================
async function addMoreProblems(id, weakness) {
  const card = document.getElementById(id);
  const moreBtn = document.getElementById(`${id}-more-btn`);
  if (!card || !moreBtn) return;

  const existingProblems = JSON.parse(card.dataset.problems || '[]');
  moreBtn.disabled = true;
  moreBtn.innerHTML = '<span class="loading-spinner dark"></span> 生成中...';

  const data = GRADE_DATA[currentGrade];

  try {
    await generateProblemsForWeakness(weakness, data, id, existingProblems);
    moreBtn.disabled = false;
    moreBtn.innerHTML = '＋ さらに2問追加';
  } catch (e) {
    moreBtn.disabled = false;
    moreBtn.innerHTML = '＋ さらに2問追加';
    const actionsEl = document.getElementById(`${id}-actions`);
    if (actionsEl) {
      const errDiv = document.createElement('div');
      errDiv.className = 'error-box';
      errDiv.style.width = '100%';
      errDiv.textContent = 'エラー: ' + e.message;
      actionsEl.insertAdjacentElement('afterend', errDiv);
      setTimeout(() => errDiv.remove(), 5000);
    }
  }
}
</script>
